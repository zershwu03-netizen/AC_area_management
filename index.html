<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>施工面積管理</title>
<style>
:root{
  --bg:#f0f4f8;--surface:#ffffff;--surface2:#f5f7fa;--border:#dde3ec;
  --accent:#2563eb;--accent2:#d97706;--text:#1e293b;--text-dim:#64748b;
  --danger:#dc2626;--success:#16a34a;--header-bg:#ffffff;
  --row-odd:#ffffff;--row-even:#f8fafc;--input-bg:#f8fafc;
  --font:'Microsoft YaHei','PingFang TC','Noto Sans TC',sans-serif;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.1),0 1px 4px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

.topbar{background:var(--header-bg);border-bottom:1px solid var(--border);box-shadow:var(--shadow);padding:11px 13px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:7px;}
.topbar-title{font-size:15px;font-weight:800;letter-spacing:.5px;color:var(--accent);white-space:nowrap;}
.topbar-right{display:flex;gap:6px;align-items:center;flex-shrink:0;}

.btn{display:flex;align-items:center;gap:4px;padding:7px 12px;border-radius:8px;border:none;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-success{background:#16a34a;color:#fff;}.btn-success:active{background:#15803d;}
.btn-warn{background:var(--accent2);color:#fff;}.btn-warn:active{opacity:.85;}
.btn-danger{background:var(--danger);color:#fff;}.btn-danger:active{opacity:.85;}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-ghost:active{background:var(--border);}
.btn svg{width:13px;height:13px;flex-shrink:0;}

.sync-pill{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);cursor:default;white-space:nowrap;flex-direction:column;gap:1px;padding:5px 11px;line-height:1.3;}
.sync-pill.ok{color:var(--success);border-color:rgba(22,163,74,.4);background:rgba(22,163,74,.06);}
.sync-pill.err{color:var(--danger);border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.05);}
.sync-pill.syncing{color:#d97706;border-color:rgba(217,119,6,.4);background:rgba(217,119,6,.06);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}

.main{padding:11px;max-width:800px;margin:0 auto;}
.section-label{font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:7px;padding-left:2px;}
.records-list{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}

.stats-bar{display:flex;gap:7px;margin-bottom:11px;}
.stat-chip{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;box-shadow:var(--shadow);}
.stat-chip .val{font-size:22px;font-weight:700;color:var(--accent);}
.stat-chip .lbl{font-size:14px;color:var(--text-dim);margin-top:1px;}

.record-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);transition:border-color .2s,box-shadow .2s;}
.record-card.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12),var(--shadow);}
.record-card-header{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;cursor:pointer;gap:7px;background:var(--surface);}
.record-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;flex:1;min-width:0;}
.tag{font-size:12px;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);white-space:nowrap;}
.tag.accent{background:#eff6ff;color:#2563eb;border-color:#bfdbfe;}
.tag.warn{background:#fffbeb;color:#d97706;border-color:#fde68a;}
.record-title{font-size:12px;font-weight:700;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.record-actions{display:flex;gap:4px;flex-shrink:0;}
/* shift toggle buttons */
.shift-toggle{display:flex;gap:5px;}
.shift-btn{flex:1;padding:8px 0;border-radius:7px;border:1.5px solid var(--border);background:var(--surface2);font-family:var(--font);font-size:14px;font-weight:600;color:var(--text-dim);cursor:pointer;text-align:center;transition:all .18s;}
.shift-btn.active-day{background:#fffbeb;border-color:#f59e0b;color:#d97706;}
.shift-btn.active-night{background:#eff6ff;border-color:#3b82f6;color:#2563eb;}
/* location badge in header — distinct from case badge */
.card-loc-badge{font-size:12px;font-weight:800;color:#fff;background:var(--accent);border-radius:5px;padding:2px 7px;white-space:nowrap;flex-shrink:0;letter-spacing:.5px;}
.card-summary{display:flex;flex-direction:column;gap:6px;padding:8px 13px 10px;border-top:1px solid var(--border);background:var(--surface2);}
.card-sum-item{display:flex;align-items:baseline;gap:3px;}
.card-sum-label{font-size:12px;color:var(--text-dim);}
.card-sum-val{font-size:15px;font-weight:700;color:var(--accent);}
.card-sum-unit{font-size:12px;color:var(--text-dim);}
.card-case-badge{font-size:12px;font-weight:700;color:var(--accent);background:#eff6ff;border:1px solid #bfdbfe;border-radius:5px;padding:2px 6px;white-space:nowrap;flex-shrink:0;}
.icon-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:7px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;color:var(--text-dim);transition:all .15s;}
.icon-btn:active{background:var(--border);}
.icon-btn.del:active{background:var(--danger);color:#fff;}

.record-body{display:none;padding:12px 13px 13px;flex-direction:column;gap:8px;border-top:1px solid var(--border);}
.record-body.open{display:flex;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.info-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.fg{display:flex;flex-direction:column;gap:3px;}
.fl{font-size:13px;font-weight:700;letter-spacing:.4px;color:var(--text-dim);text-transform:uppercase;}
.fi,.fs{background:var(--input-bg);border:1.5px solid var(--border);border-radius:7px;padding:8px 8px;font-family:var(--font);font-size:17px;color:var(--text);width:100%;-webkit-appearance:none;appearance:none;transition:border-color .15s;}
.fi:focus,.fs:focus{outline:none;border-color:var(--accent);background:#fff;}
.fi[readonly]{background:var(--surface2);cursor:default;color:var(--accent);font-weight:600;}
.sw{position:relative;}.sw::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-dim);font-size:11px;}
.sw .fs{padding-right:24px;}

.add-card{background:var(--surface);border:2px dashed var(--border);border-radius:11px;padding:14px;text-align:center;cursor:pointer;color:var(--text-dim);font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:14px;transition:border-color .2s,background .2s,color .2s;box-shadow:var(--shadow);}
.add-card:active{border-color:var(--accent);background:#eff6ff;color:var(--accent);}

/* TABLE */
.tbl-section{margin-top:2px;}
.tbl-label{font-size:15px;font-weight:700;color:var(--accent2);margin-bottom:6px;padding:5px 9px;background:#fffbeb;border-radius:5px;border-left:3px solid var(--accent2);}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
table.dt{width:100%;border-collapse:collapse;min-width:490px;}
table.dt th{background:#f1f5f9;color:var(--text-dim);font-size:15px;font-weight:700;letter-spacing:.4px;padding:8px 4px;text-align:center;border-bottom:2px solid var(--border);white-space:nowrap;}
table.dt td{padding:5px 3px;border-bottom:1px solid var(--border);font-size:15px;text-align:center;vertical-align:middle;user-select:none;}
table.dt tbody tr:nth-child(odd) td{background:var(--row-odd);}
table.dt tbody tr:nth-child(even) td{background:var(--row-even);}
table.dt tbody tr:last-child td{border-bottom:none;}
.ci{background:transparent;border:1.5px solid transparent;border-radius:5px;padding:5px 3px;font-family:var(--font);font-size:15px;color:var(--text);width:100%;text-align:center;transition:border-color .15s,background .15s;min-width:44px;user-select:text;}
.ci:focus{outline:none;border-color:var(--accent);background:#fff;}
.ci.seg{min-width:100px;text-align:left;}
.cr{font-size:15px;color:var(--accent2);font-weight:700;padding:4px 2px;}
.cr.dim{color:var(--text-dim);font-weight:400;}

.total-row td{background:#eff6ff !important;font-weight:700;color:var(--accent);}
.summary-row td{background:#dbeafe !important;font-weight:700;color:var(--text);}

.add-row-btn{width:100%;padding:7px;border-radius:7px;border:1.5px dashed var(--border);background:transparent;color:var(--text-dim);font-family:var(--font);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:6px;transition:all .15s;}
.add-row-btn:active{border-color:var(--accent);color:var(--accent);}
.del-row-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;font-size:14px;line-height:1;margin:0 auto;transition:all .15s;}
.del-row-btn:active{background:var(--danger);color:#fff;border-color:var(--danger);}

/* MODALS */
.mo{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:200;align-items:center;justify-content:center;padding:14px;}
.mo.open{display:flex;}
.md{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 18px;max-width:400px;width:100%;box-shadow:var(--shadow-md);display:flex;flex-direction:column;gap:12px;max-height:88vh;}
.md h3{font-size:14px;font-weight:700;color:var(--text);}
.md-actions{display:flex;gap:7px;}
.md-actions .btn{flex:1;justify-content:center;}
.mat-list{display:flex;flex-direction:column;gap:5px;overflow-y:auto;max-height:200px;}
.mat-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;gap:6px;}
.mat-item span{font-size:13px;flex:1;color:var(--text);}
.mat-del{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text-dim);cursor:pointer;font-size:15px;line-height:1;border-radius:5px;}
.mat-del:active{color:var(--danger);}
.add-mat{display:flex;gap:6px;}
.add-mat input{flex:1;background:var(--input-bg);border:1.5px solid var(--border);border-radius:7px;padding:8px 8px;font-family:var(--font);font-size:13px;color:var(--text);}
.add-mat input:focus{outline:none;border-color:var(--accent);}

/* FB Config */
.fb-hint{font-size:11px;color:var(--text-dim);line-height:1.65;background:var(--surface2);border-radius:7px;padding:9px 10px;border:1px solid var(--border);}
.fb-hint a{color:var(--accent);}
.fb-fields{display:flex;flex-direction:column;gap:7px;overflow-y:auto;max-height:52vh;}
.fb-row{display:flex;flex-direction:column;gap:2px;}
.fb-row label{font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:.4px;text-transform:uppercase;}
.fb-row input{background:var(--input-bg);border:1.5px solid var(--border);border-radius:7px;padding:8px 8px;font-family:var(--font);font-size:12px;color:var(--text);width:100%;}
.fb-row input:focus{outline:none;border-color:var(--accent);}
.fb-status{font-size:12px;padding:7px 10px;border-radius:7px;font-weight:600;}
.fb-status.connected{background:#f0fdf4;color:var(--success);border:1px solid #bbf7d0;}
.fb-status.disconnected{background:#fef2f2;color:var(--danger);border:1px solid #fecaca;}

/* TOAST */
.to-top{position:fixed;bottom:24px;right:16px;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,99,235,.35);z-index:150;transition:all .2s;}
.to-top.show{display:flex;}
.to-top:active{background:#1d4ed8;transform:scale(.93);}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);border-radius:9px;padding:10px 16px;font-size:13px;font-weight:600;color:#fff;z-index:999;transition:transform .28s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:var(--shadow-md);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--success);}
.toast.error{background:var(--danger);}

.btn-print{background:#2563eb;color:#fff;font-size:12px;font-weight:600;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .18s;}
.btn-print:active{background:#1d4ed8;}
.btn-print svg{width:14px;height:14px;}




/* CASE GROUP CARD */
.case-card{background:var(--surface);border:1.5px solid var(--accent);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:10px;}
.case-card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;background:linear-gradient(135deg,#eff6ff,#f8fafc);gap:8px;user-select:none;}
.case-header-left{display:flex;flex-direction:column;gap:5px;flex:1;min-width:0;}
.case-header-row1{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.case-loc-big{font-size:14px;font-weight:800;color:#fff;background:var(--accent);border-radius:6px;padding:3px 10px;white-space:nowrap;}
.case-num-big{font-size:14px;font-weight:700;color:var(--accent);background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:6px;padding:3px 10px;white-space:nowrap;}
.case-header-row2{display:flex;gap:12px;flex-wrap:wrap;align-items:baseline;}
.case-stat{display:flex;align-items:baseline;gap:3px;}
.case-stat-label{font-size:11px;color:var(--text-dim);}
.case-stat-val{font-size:15px;font-weight:700;color:var(--accent);}
.case-stat-unit{font-size:11px;color:var(--text-dim);}
.case-accept-badge{font-size:11px;font-weight:700;border-radius:5px;padding:2px 8px;white-space:nowrap;}
.case-accept-badge.done{color:#166534;background:#dcfce7;border:1px solid #86efac;}
.case-accept-badge.pending{color:#92400e;background:#fef3c7;border:1px solid #fcd34d;}
.case-records{padding:0 10px 10px;}
.case-records.collapsed{display:none;}
.case-accept-section{padding:10px 14px 0;background:#f0fdf4;border-top:1px solid #86efac;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.sign-count-badge{font-size:12px;font-weight:700;color:#1d4ed8;background:#eff6ff;border:1px solid #bfdbfe;border-radius:5px;padding:2px 8px;white-space:nowrap;}
/* MONTH GROUP */
.month-group{}
.month-header{display:flex;align-items:center;justify-content:space-between;padding:8px 4px 6px;cursor:pointer;user-select:none;}
.month-title{font-size:14px;font-weight:700;color:var(--text-dim);letter-spacing:.5px;}
.month-count{font-size:12px;color:var(--text-dim);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:2px 9px;}
.month-chevron{font-size:12px;color:var(--text-dim);transition:transform .2s;display:inline-block;}
.month-cards{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
.month-cards.collapsed{display:none;}

/* JUMP PICKER */
.jump-bar{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.jump-label{font-size:12px;color:var(--text-dim);font-weight:600;flex-shrink:0;}
.jump-sel{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-family:var(--font);font-size:13px;color:var(--text);-webkit-appearance:none;appearance:none;cursor:pointer;flex-shrink:0;}
.jump-sel:focus{outline:none;border-color:var(--accent);}
/* SEARCH BAR */
.search-bar{display:flex;gap:7px;margin-bottom:10px;align-items:center;}
.search-input{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-family:var(--font);font-size:14px;color:var(--text);box-shadow:var(--shadow);}
.search-input:focus{outline:none;border-color:var(--accent);}
.filter-btn{display:flex;align-items:center;gap:4px;padding:9px 12px;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-family:var(--font);font-size:13px;font-weight:600;color:var(--text-dim);cursor:pointer;white-space:nowrap;box-shadow:var(--shadow);}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:#eff6ff;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.filter-tag{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--text-dim);cursor:pointer;transition:all .15s;}
.filter-tag.active{border-color:var(--accent);color:var(--accent);background:#eff6ff;}

/* OFFLINE BANNER */
.offline-banner{display:none;background:#fef3c7;border:1.5px solid #f59e0b;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:600;color:#92400e;margin-bottom:10px;align-items:center;gap:8px;}
.offline-banner.show{display:flex;}

/* STATS MODAL */
.stats-grid{display:flex;flex-direction:column;gap:8px;overflow-y:auto;max-height:60vh;}
.stats-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;}
.stats-row-name{font-size:14px;font-weight:700;color:var(--text);}
.stats-row-area{font-size:13px;font-weight:700;color:var(--accent);text-align:right;white-space:nowrap;}
.stats-row-tons{font-size:13px;font-weight:700;color:var(--accent2);text-align:right;white-space:nowrap;}
.stats-total{display:grid;grid-template-columns:1fr auto auto;gap:10px;padding:11px 12px;background:#eff6ff;border:2px solid var(--accent);border-radius:8px;margin-top:4px;}
.stats-col-hdr{font-size:11px;font-weight:700;color:var(--text-dim);text-align:right;letter-spacing:.5px;text-transform:uppercase;}

/* SORT BAR */
.sort-bar{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.sort-label{font-size:12px;color:var(--text-dim);font-weight:600;flex-shrink:0;}
.sort-btn{padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--text-dim);cursor:pointer;transition:all .15s;white-space:nowrap;}
.sort-btn.active{border-color:var(--accent);color:var(--accent);background:#eff6ff;}

/* LOCKED CARD */
.record-card.locked{border-color:#94a3b8 !important;opacity:.85;}
.locked-badge{font-size:10px;font-weight:700;color:#166534;background:#dcfce7;border:1px solid #86efac;border-radius:4px;padding:2px 8px;white-space:nowrap;flex-shrink:0;max-width:200px;overflow:hidden;text-overflow:ellipsis;}

/* LONG-PRESS MENU */
.ctx-menu{display:none;position:fixed;z-index:300;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.15);min-width:180px;overflow:hidden;}
.ctx-menu.show{display:block;}
.ctx-item{display:flex;align-items:center;gap:10px;padding:13px 16px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;transition:background .12s;}
.ctx-item:active{background:var(--surface2);}
.ctx-item.danger{color:var(--danger);}
.ctx-item svg{width:16px;height:16px;flex-shrink:0;}
.ctx-overlay{display:none;position:fixed;inset:0;z-index:299;}
.ctx-overlay.show{display:block;}

/* PRINT PREVIEW MODAL */
.preview-mo{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:250;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
.preview-mo.open{display:flex;}
.preview-box{background:#fff;border-radius:14px;max-width:600px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;}
.preview-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #e2e8f0;background:#f8fafc;}
.preview-topbar span{font-size:14px;font-weight:700;color:#1e293b;}
.preview-actions{display:flex;gap:8px;}
.preview-content{padding:16px;overflow-x:auto;}


/* AFTER-WORK TABLE */
.tbl-label-after{font-size:15px;font-weight:700;color:#16a34a;margin-bottom:6px;padding:5px 9px;background:#f0fdf4;border-radius:5px;border-left:3px solid #16a34a;margin-top:12px;}
.diff-box{margin-top:10px;border:1.5px solid #e2e8f0;border-radius:9px;overflow:hidden;}

<script>
// ══════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════
const STORE_KEY  = 'cr_v6';
const CASE_KEY   = 'cases_v1';
const MAT_KEY    = 'mat_v2';
const LOC_KEY    = 'loc_v1';
const WEEKDAYS   = ['日','一','二','三','四','五','六'];
const DEF_MATS   = ['再生3/8"','再生3/4"','新料3/8"','新料3/4"','改三3/4"','改三1"'];
const DEF_LOCS   = ['板橋'];
const DENSITY    = 2.3;

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let records   = [];
let cases     = [];  // [{id, caseLocation, caseNum, preAcceptDate, mainAcceptDate}]
let materials = [];
let locations = [];
let delTarget = null;
let fbApp     = null;
let fbDB      = null;
let fbUnsub   = null;
let fbConnected = false;

// ══════════════════════════════════════════
//  LOCAL STORAGE
// ══════════════════════════════════════════
function loadLocal() {
  try { records   = JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { records=[]; }
  try { cases     = JSON.parse(localStorage.getItem(CASE_KEY))  || []; } catch { cases=[]; }
  try { materials = JSON.parse(localStorage.getItem(MAT_KEY))   || DEF_MATS.slice(); } catch { materials=DEF_MATS.slice(); }
  try { locations = JSON.parse(localStorage.getItem(LOC_KEY))   || DEF_LOCS.slice(); } catch { locations=DEF_LOCS.slice(); }
  // Migrate old records: if record has caseLocation/caseNum but no caseId, create a case for it
  migrateToCases();
  // Only seed on true first-ever launch (localStorage key has never been written)
  const everInitialized = localStorage.getItem('app_initialized');
  if (!everInitialized && !cases.length && !records.length) {
    seedDemo();
  }
  // Mark as initialized so seedDemo never runs again
  localStorage.setItem('app_initialized', '1');
}
function saveLocal() {
  localStorage.setItem(STORE_KEY, JSON.stringify(records));
  localStorage.setItem(CASE_KEY,  JSON.stringify(cases));
  localStorage.setItem(MAT_KEY,   JSON.stringify(materials));
  localStorage.setItem(LOC_KEY,   JSON.stringify(locations));
}

function seedDemo() {
  const cid = Date.now();
  cases = [{ id:cid, caseLocation:'板橋', caseNum:'八', preAcceptDate:'', mainAcceptDate:'' }];
  records = [{
    id:cid+1, caseId:cid,
    date:'115/3/8', weekday:'六',
    shift:'夜間', prepare:'21:30', milling:'22:00', paving:'23:00', zone:'重慶路245巷', material:'改三1"',
    rows:[
      {id:1,segment:'重慶路245巷至223巷',area:96,   thickness:'20', signs:''},
      {id:2,segment:'223巷口至221號',    area:124,  thickness:'20', signs:''},
      {id:3,segment:'221號至大豐街',     area:113.4,thickness:'20', signs:''},
      {id:4,segment:'大豐街至忠孝路',    area:403.2,thickness:'20', signs:''},
    ]
  }];
  saveLocal();
}

function migrateToCases() {
  // Group old records (without caseId) by caseLocation+caseNum
  const oldRecs = records.filter(r => !r.caseId);
  if (!oldRecs.length) return;
  const map = {};
  oldRecs.forEach(r => {
    const key = (r.caseLocation||'') + '|' + (r.caseNum||'');
    if (!map[key]) {
      const cid = Date.now() + Math.random()*10000|0;
      map[key] = { id:cid, caseLocation:r.caseLocation||'板橋', caseNum:r.caseNum||'', preAcceptDate: r.preAcceptDate||'', mainAcceptDate: r.mainAcceptDate||'' };
      cases.push(map[key]);
    }
    r.caseId = map[key].id;
  });
  saveLocal();
}
// 組合完整派案名稱（用於列印/Excel標題）
function buildCaseNo(rec) {
  const loc = rec.caseLocation || '';
  const num = rec.caseNum || '';
  if (!loc && !num) return '未命名派案';
  if (!num) return `${loc}派案`;
  return `${loc}第${num}派案`;
}
// 卡片 badge 只顯示編號部分（地點已由左邊 badge 顯示）
function buildCaseNumLabel(rec) {
  const num = rec.caseNum || '';
  if (!num) return '派案';
  return `第${num}派案`;
}

// ══════════════════════════════════════════
//  FIREBASE INIT (hardcoded config)
// ══════════════════════════════════════════
async function initFirebase() {
  const cfg = {
    apiKey:            "AIzaSyCzLwCL6nubH14f-l4Ss3jLGK2JREbvPOs",
    authDomain:        "ac-area-management.firebaseapp.com",
    projectId:         "ac-area-management",
    storageBucket:     "ac-area-management.firebasestorage.app",
    messagingSenderId: "94710107708",
    appId:             "1:94710107708:web:29efa5a0647bd54b5e7d39",
    measurementId:     "G-F4PESK6HKN"
  };

  try {
    const [fbApp_m, fbFS_m] = await Promise.all([
      import('https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js'),
      import('https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js'),
    ]);
    const { initializeApp, getApps, getApp } = fbApp_m;
    const { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } = fbFS_m;

    fbApp = getApps().length ? getApp() : initializeApp(cfg);
    fbDB  = getFirestore(fbApp);

    // Listen to records — 只在其他裝置有變動時才重新渲染
    if (fbUnsub) fbUnsub();
    fbUnsub = onSnapshot(collection(fbDB,'records'), snap => {
      // 如果是自己觸發的寫入，忽略這次 snapshot（避免重新渲染打斷輸入）
      if (window._suppressSnapshot) return;
      const docs = [];
      snap.forEach(d => docs.push(d.data()));
      docs.sort((a,b)=>(b.id||0)-(a.id||0));
      records = docs;
      saveLocal();
      render();
    }, err => { console.warn('Firestore error:', err); });

    // Listen to materials
    onSnapshot(doc(fbDB,'config','materials'), snap => {
      if (snap.exists()) { materials = snap.data().list||[]; saveLocal(); }
    });

    // Expose helpers
    window._fbSave = async (rec) => {
      window._suppressSnapshot = true;
      await setDoc(doc(fbDB,'records',String(rec.id)), JSON.parse(JSON.stringify(rec)));
      // 短暫延遲後解除，讓其他裝置的真實更新能正常進來
      clearTimeout(window._suppressTimer);
      window._suppressTimer = setTimeout(() => { window._suppressSnapshot = false; }, 1500);
    };
    window._fbDel = async (id) => {
      window._suppressSnapshot = true;
      await deleteDoc(doc(fbDB,'records',String(id)));
      clearTimeout(window._suppressTimer);
      window._suppressTimer = setTimeout(() => { window._suppressSnapshot = false; }, 1500);
    };
    window._fbSaveMats = async (list) => {
      await setDoc(doc(fbDB,'config','materials'), {list});
    };

    fbConnected = true;
    updateSyncUI();
    showToast('Firebase 已連線 🔥','success');
  } catch(e) {
    console.warn('Firebase init error:', e);
    fbConnected = false;
    updateSyncUI();
  }
}

function fmtTime(d) {
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0') + ':' + d.getSeconds().toString().padStart(2,'0');
}

function updateSyncUI(state) {
  const pill  = document.getElementById('syncPill');
  const label = document.getElementById('syncLabel');
  const sub   = document.getElementById('syncSub');
  if (!fbConnected) {
    pill.className='sync-pill err';
    label.textContent='本地模式';
    if (sub) sub.textContent='未連線雲端';
    return;
  }
  if (state === 'syncing') {
    pill.className='sync-pill syncing';
    label.textContent='同步中…';
    if (sub) sub.textContent='';
  } else if (state === 'synced') {
    const t = fmtTime(new Date());
    pill.className='sync-pill ok';
    label.textContent='✅ 已同步';
    if (sub) sub.textContent=t;
    window._lastSyncTime = t;
    showToast('資料已儲存至雲端 ✓', 'success');
  } else {
    pill.className='sync-pill ok';
    label.textContent='雲端連線';
    if (sub) sub.textContent = window._lastSyncTime || '';
  }
}

// ══════════════════════════════════════════
//  CRUD OPERATIONS (local + cloud)
// ══════════════════════════════════════════
async function persistCase(c) {
  const i = cases.findIndex(x=>x.id===c.id);
  if (i>=0) cases[i]=c; else cases.push(c);
  saveLocal();
  if (fbConnected && window._fbSaveCase) {
    updateSyncUI('syncing');
    try { await window._fbSaveCase(c); updateSyncUI('synced'); }
    catch(e) { showToast('雲端同步失敗','error'); updateSyncUI(); }
  } else if (!fbConnected) {
    showToast('已暫存於本機 💾', '');
  }
}

async function removeCase(id) {
  cases = cases.filter(c=>c.id!==id);
  // also remove all records belonging to this case
  const toRemove = records.filter(r=>r.caseId===id);
  records = records.filter(r=>r.caseId!==id);
  saveLocal();
  if (fbConnected) {
    if (window._fbDelCase) try { await window._fbDelCase(id); } catch(e){}
    for (const r of toRemove) {
      if (window._fbDel) try { await window._fbDel(r.id); } catch(e){}
    }
  }
}

async function persistRecord(rec) {
  const i = records.findIndex(r=>r.id===rec.id);
  if (i>=0) records[i]=rec; else records.unshift(rec);
  saveLocal(); updateStats();
  if (fbConnected && window._fbSave) {
    updateSyncUI('syncing');
    try {
      await window._fbSave(rec);
      updateSyncUI('synced');
    } catch(e) {
      showToast('雲端同步失敗','error');
      updateSyncUI();
    }
  }
}

async function removeRecord(id) {
  records = records.filter(r=>r.id!==id);
  saveLocal(); updateStats();
  if (fbConnected && window._fbDel) {
    updateSyncUI('syncing');
    try {
      await window._fbDel(id);
      updateSyncUI('synced');
    } catch(e) {
      showToast('雲端同步失敗','error');
      updateSyncUI();
    }
  }
}

async function persistMats() {
  saveLocal();
  if (fbConnected && window._fbSaveMats) {
    try { await window._fbSaveMats(materials); } catch(e) {}
  }
}

// ══════════════════════════════════════════
//  CALCULATIONS
// ══════════════════════════════════════════
function calcTons(area, th) {
  const t = parseFloat(th)||0;
  return +(area * DENSITY * (t/100)).toFixed(2);
}
function calcMill(area, th) {
  const t = parseFloat(th)||0;
  return +(area * DENSITY * (Math.max(0,t-0.5)/100)).toFixed(2);
}
function recTot(rec, what) {
  return rec.rows.reduce((s,r)=>{
    const a=+r.area||0, t=r.thickness||'0';
    if(what==='area') return s+a;
    if(what==='tons') return s+calcTons(a,t);
    if(what==='mill') return s+calcMill(a,t);
    return s;
  },0);
}
function n(v,d=2){return isNaN(v)||v===0?'0':v.toFixed(d);}

function parseDate(s){
  if(!s) return null;
  const roc=s.match(/^(\d{2,3})\/(\d{1,2})\/(\d{1,2})$/);
  if(roc) return new Date(+roc[1]+1911,+roc[2]-1,+roc[3]);
  const w=s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/);
  if(w) return new Date(+w[1],+w[2]-1,+w[3]);
  return null;
}
function weekday(s){const d=parseDate(s);return(d&&!isNaN(d))?WEEKDAYS[d.getDay()]:''; }

function renderRow(rec,row,idx){
  const a=+row.area||0, t=row.thickness||'';

  return `<tr id="tr-${rec.id}-${row.id}">
    <td><div class="cr">${idx+1}</div></td>
    <td><input class="ci seg" value="${ea(row.segment||'')}" oninput="urf(${rec.id},${row.id},'segment',this.value)" placeholder="路段名稱"></td>
    <td><input class="ci" type="number" step="0.1" value="${a||''}" oninput="urA(${rec.id},${row.id},this)" placeholder="0"></td>
    <td><input class="ci" type="number" step="0.5" value="${ea(t)}" oninput="urT(${rec.id},${row.id},this.value)" placeholder="cm"></td>
    <td><div class="cr" id="tn-${rec.id}-${row.id}">${tons}</div></td>
    <td><div class="cr dim" id="mn-${rec.id}-${row.id}">${mill}</div></td>
    <td><input class="ci" type="number" min="0" step="1" value="${row.signs||''}" oninput="urf(${rec.id},${row.id},'signs',this.value);updSignCount(${rec.id})" placeholder="0" style="min-width:36px;max-width:48px"></td>

}

//  INTERACTIONS
// ══════════════════════════════════════════
function toggle(id){
  const bd=document.getElementById(`bd-${id}`);
  const ch=document.getElementById(`ch-${id}`);
  const cd=document.getElementById(`card-${id}`);
  const o=bd.classList.toggle('open');
  cd.classList.toggle('active',o);
  if(ch) ch.style.transform=o?'rotate(180deg)':'';
}
function gr(id){return records.find(r=>r.id===id);}

// 驗收日期
function uAccept(id, val) {
  const rec = gr(id); if (!rec) return;
  rec.acceptDate = val;
  persistRecord(rec);
  // update badge
  const badge = document.getElementById(`lb-${id}`);
  if (badge) badge.textContent = '✅ 已完工' + (val ? '　驗收：' + val : '　⏳ 待驗收');
}

// 日/夜切換
function uShift(id, val, btn) {
  const rec = gr(id); if (!rec) return;
  rec.shift = val; persistRecord(rec);
  // update header tag
  const tag = document.getElementById(`ts-${id}`);
  if (tag) tag.textContent = val;
  // update button states
  const panel = btn.closest('.shift-toggle');
  if (panel) {
    panel.querySelectorAll('.shift-btn').forEach(b => {
      b.className = 'shift-btn';
      if (b === btn) b.classList.add(val === '日間' ? 'active-day' : 'active-night');
    });
  }
}

// 更新派案地點或編號，重新組合顯示名稱
function uCaseField(id, field, val) {
  // 地點選單：若選到「新增地點」則開啟輸入
  if (field === 'caseLocation' && val === '__addloc__') {
    // restore select value then open modal
    const rec0 = gr(id);
    const sel0 = document.getElementById(`cl-${id}`);
    if (sel0 && rec0) sel0.value = rec0.caseLocation || locations[0] || '';
    openLocMo(id);
    return;
  }
  const rec = gr(id); if (!rec) return;
  rec[field] = val;
  const badge = document.getElementById(`tcn-${id}`);
  if (badge) badge.textContent = buildCaseNumLabel(rec);
  // 同步更新地點 badge
  if (field === 'caseLocation') {
    const locBadge = document.getElementById(`tloc-${id}`);
    if (locBadge) locBadge.textContent = val;
  }
  persistRecord(rec);
}

function uf(id,field,val){
  const rec=gr(id);if(!rec)return;
  rec[field]=val; persistRecord(rec);
  if(field==='shift'){const e=document.getElementById(`ts-${id}`);if(e)e.textContent=val||'--';}
  if(field==='zone'){
    const e=document.getElementById(`tz-${id}`);if(e)e.textContent=val||'未命名工區';
    const l=document.getElementById(`tl-${id}`);if(l)l.textContent=`📊 施工路段明細 — ${val||''}`;
  }
}
function uDate(id,val){
  const rec=gr(id);if(!rec)return;
  rec.date=val; rec.weekday=weekday(val); persistRecord(rec);
  document.getElementById(`td-${id}`).textContent=val||'--';
  document.getElementById(`tw-${id}`).textContent=rec.weekday;
  document.getElementById(`wi-${id}`).value=rec.weekday;
}
function uMat(id,sel){
  if(sel.value==='__manage__'){openMatMo();const r=gr(id);if(r)sel.value=r.material;return;}
  uf(id,'material',sel.value);
}
function urf(rId,rId2,f,v){const rec=gr(rId);if(!rec)return;const row=rec.rows.find(r=>r.id===rId2);if(row){row[f]=v;persistRecord(rec);}}
function urA(rId,rId2,inp){
  const rec=gr(rId);if(!rec)return;const row=rec.rows.find(r=>r.id===rId2);if(!row)return;
  row.area=parseFloat(inp.value)||0; refreshRow(rId,rId2,row); updTots(rId); persistRecord(rec);
}
function urT(rId,rId2,v){
  const rec=gr(rId);if(!rec)return;const row=rec.rows.find(r=>r.id===rId2);if(!row)return;
  row.thickness=v; refreshRow(rId,rId2,row); updTots(rId); persistRecord(rec);
}
function refreshRow(rId,rId2,row){

  const numEl=document.querySelector(`#${cid} .case-num-big`);

  if(numEl&&field==='caseNum') numEl.textContent='第'+(val||'?')+'派案';
  // Update accept badge
  if(field==='preAcceptDate'||field==='mainAcceptDate') {

      else{ab.className='case-accept-badge pending';ab.textContent='⏳ 待驗收';}
    }
  }
}

//  SEARCH & FILTER
// ══════════════════════════════════════════
let searchQ = '';
let activeFilter = 'all';

function doSearch() {
  searchQ = document.getElementById('searchInp').value.replace(/\s+/g,' ').trim().toLowerCase();
  renderFiltered();
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderFiltered();
}

function getFiltered() {
  return records.filter(rec => {
    // shift filter
    if (activeFilter === 'day'   && rec.shift !== '日間') return false;
    if (activeFilter === 'night' && rec.shift !== '夜間') return false;
    // search
    if (!searchQ) return true;
    const hay = [
      buildCaseNo(rec) || '',
      rec.zone || '',
      rec.date || '',
      rec.material || '',
      rec.caseLocation || '',
      rec.caseNum || '',
      buildCaseNumLabel(rec) || '',
      ...( rec.rows||[] ).map(r=>r.segment||'')
    ].join('　').replace(/\s+/g,' ').trim().toLowerCase();
    // split searchQ into words, all must match
    return searchQ.split(' ').filter(Boolean).every(w => hay.includes(w));
  });
}

function getCaseRecords(caseId) {
  return records
    .filter(r => r.caseId === caseId)
    .sort((a,b) => {
      const da=parseDate(a.date), db=parseDate(b.date);
      return (da?da.getTime():0) - (db?db.getTime():0);
    });
}

function filterCases() {
  // Filter cases that have at least one record matching search/filter
  return cases.filter(c => {
    const recs = getCaseRecords(c.id);
    if (!recs.length) return true; // show empty cases
    return recs.some(rec => {
      if (activeFilter==='day'   && rec.shift!=='日間') return false;
      if (activeFilter==='night' && rec.shift!=='夜間') return false;
      if (!searchQ) return true;
      const hay = [
        c.caseLocation||'', c.caseNum||'',
        (c.caseLocation||'')+'第'+(c.caseNum||'')+'派案',
        rec.zone||'', rec.date||'', rec.material||'',
        ...(rec.rows||[]).map(r=>r.segment||'')
      ].join('　').toLowerCase();
      return searchQ.split(' ').filter(Boolean).every(w=>hay.includes(w));
    });
  });
}

function renderFiltered() {
  const rl = document.getElementById('rl');
  const filteredCases = filterCases();

  if (!filteredCases.length && !cases.length) {
    rl.innerHTML = `<div style="text-align:center;padding:36px 14px;color:var(--text-dim);font-size:13px">
      <div style="font-size:30px;margin-bottom:9px;opacity:.4">📋</div>尚無派案，點上方「新增派案」開始</div>`;
    updateStats(); updateJumpPicker([]); return;
  }

  if (!filteredCases.length) {
    rl.innerHTML = `<div style="text-align:center;padding:30px 14px;color:var(--text-dim);font-size:14px">
      <div style="font-size:28px;margin-bottom:8px">🔍</div>找不到符合的記錄</div>`;
    updateStats(); return;
  }

  // Separate active vs completed cases
  const activeCases = filteredCases.filter(c => {
    const recs = getCaseRecords(c.id);
    return !recs.length || !recs.every(r=>r.locked);
  });
  const doneCases = filteredCases.filter(c => {
    const recs = getCaseRecords(c.id);
    return recs.length > 0 && recs.every(r=>r.locked);
  });

  let html = activeCases.map(c=>renderCaseBigCard(c)).join('');
  if (doneCases.length) {
    html += `<div style="margin:10px 0 8px;padding:6px 4px;display:flex;align-items:center;gap:8px;border-top:2px dashed #86efac">
      <span style="font-size:12px;font-weight:700;color:#16a34a">✅ 已完工派案</span>
      <span style="font-size:11px;color:var(--text-dim)">${doneCases.length} 個</span>
    </div>`;
    html += doneCases.map(c=>renderCaseBigCard(c)).join('');
  }

  rl.innerHTML = html;
  updateStats();
  updateJumpPicker(filteredCases.map(c=>`${c.caseLocation||''}第${c.caseNum||'?'}派案`));
}

// ══════════════════════════════════════════
//  AFTER-WORK ROWS
// ══════════════════════════════════════════
function recAfterTot(rec, what) {
  if (!rec.afterRows || !rec.afterRows.length) return 0;
  return rec.afterRows.reduce((s, r) => {
    const a = +r.area||0, t = r.thickness||'0';
    if (what==='area') return s+a;
    if (what==='tons') return s+calcTons(a,t);
    return s;
  }, 0);
}

function renderAfterRow(rec, row, idx) {
  const a = +row.area||0, t = row.thickness||'';
  const tons = a&&t ? calcTons(a,t).toFixed(2) : '';
  return `<tr id="atr-${rec.id}-${row.id}">
    <td><div class="cr" style="color:#16a34a">${idx+1}</div></td>
    <td><input class="ci seg" value="${ea(row.segment||'')}" oninput="uAfterRF(${rec.id},${row.id},'segment',this.value)" placeholder="路段名稱"></td>
    <td><input class="ci" type="number" step="0.1" value="${a||''}" oninput="uAfterArea(${rec.id},${row.id},this)" placeholder="0"></td>
    <td><input class="ci" type="number" step="0.5" value="${ea(t)}" oninput="uAfterThick(${rec.id},${row.id},this.value)" placeholder="cm"></td>
    <td><div class="cr" style="color:#16a34a" id="atons-${rec.id}-${row.id}">${tons}</div></td>
    <td><button class="del-row-btn" onclick="delAfterRow(${rec.id},${row.id})">×</button></td>
  </tr>`;
}

function addAfterRow(recId) {
  const rec = gr(recId); if (!rec) return;
  if (!rec.afterRows) rec.afterRows = [];
  const nid = Date.now();
  const defaultThick = rec.rows[0]?.thickness || '';
  rec.afterRows.push({ id:nid, segment:'', area:0, thickness:defaultThick });
  const tbody = document.getElementById(`atb-${recId}`);
  if (tbody) {
    const tr = document.createElement('tr');
    tr.id = `atr-${recId}-${nid}`;
    tr.innerHTML = renderAfterRow(rec, rec.afterRows[rec.afterRows.length-1], rec.afterRows.length-1).replace(/^<tr[^>]*>|<\/tr>$/g,'');
    tbody.appendChild(tr);
    reindexAfter(recId);
  }
  updAfterTots(recId);
  persistRecord(rec);
}

function delAfterRow(recId, rowId) {
  const rec = gr(recId); if (!rec) return;
  rec.afterRows = (rec.afterRows||[]).filter(r => r.id !== rowId);
  const el = document.getElementById(`atr-${recId}-${rowId}`);
  if (el) el.remove();
  reindexAfter(recId);
  updAfterTots(recId);
  persistRecord(rec);
}

function reindexAfter(recId) {
  const tbody = document.getElementById(`atb-${recId}`); if (!tbody) return;
  tbody.querySelectorAll('tr').forEach((tr,i) => {
    const c = tr.querySelector('td:first-child .cr'); if (c) c.textContent = i+1;
  });
}

function uAfterRF(recId, rowId, field, val) {
  const rec=gr(recId); if(!rec) return;
  const row=(rec.afterRows||[]).find(r=>r.id===rowId); if(!row) return;
  row[field]=val; persistRecord(rec);
}

function uAfterArea(recId, rowId, input) {
  const rec=gr(recId); if(!rec) return;
  const row=(rec.afterRows||[]).find(r=>r.id===rowId); if(!row) return;
  row.area = parseFloat(input.value)||0;
  refreshAfterRow(recId, rowId, row);
  updAfterTots(recId);
  persistRecord(rec);
}

function uAfterThick(recId, rowId, val) {
  const rec=gr(recId); if(!rec) return;
  const row=(rec.afterRows||[]).find(r=>r.id===rowId); if(!row) return;
  row.thickness = val;
  refreshAfterRow(recId, rowId, row);
  updAfterTots(recId);
  persistRecord(rec);
}

function refreshAfterRow(recId, rowId, row) {
  const a=+row.area||0, t=row.thickness||'';
  const el = document.getElementById(`atons-${recId}-${rowId}`);
  if (el) el.textContent = a&&t ? calcTons(a,t).toFixed(2) : '';
}

function updAfterTots(recId) {
  const rec = gr(recId); if (!rec) return;
  const ba = recAfterTot(rec,'area'), bt = recAfterTot(rec,'tons');
  const g = id => document.getElementById(id);
  if (g(`ata-${recId}`)) g(`ata-${recId}`).textContent = n(ba,1);
  if (g(`att-${recId}`)) g(`att-${recId}`).textContent = n(bt);
  const cs = document.getElementById(`cs-${recId}`);
  if (cs) {
    let afterRow = document.getElementById(`csa-${recId}`) || cs.querySelector('.cs-after-row');
    if (rec.afterRows && rec.afterRows.length > 0) {
      if (!afterRow) {
        afterRow = document.createElement('div');
        afterRow.className = 'cs-after-row';
        afterRow.id = `csa-${recId}`;
        cs.appendChild(afterRow);
      }
      const ta2 = recTot(rec,'area'), tt2 = recTot(rec,'tons');
      const ba2 = recAfterTot(rec,'area'), bt2 = recAfterTot(rec,'tons');
      const da2 = +(ba2-ta2).toFixed(1), dt2 = +(bt2-tt2).toFixed(2);
      const diffCol = v => v>0?'#16a34a':v<0?'#dc2626':'#64748b';
      const diffFmt = (v,d) => v===0?'—':(v>0?'+':'')+v.toFixed(d);
      afterRow.innerHTML = `
        <div class="cs-grid" style="margin-top:6px">
          <div class="cs-cell after"><div class="cs-cell-label">面積（後）</div><span class="cs-cell-val">${n(ba2,1)}</span><span class="cs-cell-unit"> m²</span></div>
          <div class="cs-cell after"><div class="cs-cell-label">噸數（後）</div><span class="cs-cell-val">${n(bt2)}</span><span class="cs-cell-unit"> T</span></div>
          <div class="cs-cell" style="background:#f8fafc;border:1px solid #e2e8f0">
            <div class="cs-cell-label" style="color:#64748b">差異</div>
            <div style="font-size:15px;font-weight:700;white-space:nowrap"><span style="color:${diffCol(da2)}">${diffFmt(da2,1)}</span><span style="font-size:12px;color:#64748b"> m²</span> <span style="color:#cbd5e1;font-size:12px">·</span> <span style="color:${diffCol(dt2)}">${diffFmt(dt2,2)}</span><span style="font-size:12px;color:#64748b"> T</span></div>
          </div>
        </div>`;
    } else if (afterRow) {
      afterRow.remove();
    }
  }
  updateDiffBox(recId);
}

function updateDiffBox(recId) {
  const rec = gr(recId); if (!rec) return;
  const ta = recTot(rec,'area'), tt = recTot(rec,'tons');
  const ba = recAfterTot(rec,'area'), bt = recAfterTot(rec,'tons');
  const da = +(ba-ta).toFixed(1), dt = +(bt-tt).toFixed(2);
  const fmtDiff = (v,d) => v===0 ? '—' : (v>0?'+':'')+v.toFixed(d);
  const cls = v => v>0?'diff-pos':v<0?'diff-neg':'diff-zero';
  const bd = document.getElementById(`bd-${recId}`);
  if (!bd) return;
  let diffEl = document.getElementById(`diff-${recId}`);
  if (!rec.afterRows || !rec.afterRows.length) { if (diffEl) diffEl.remove(); return; }
  if (!diffEl) {
    diffEl = document.createElement('div');
    diffEl.id = `diff-${recId}`;
    diffEl.className = 'diff-box';
    const printBtn = bd.querySelector('.btn-print');
    if (printBtn) bd.insertBefore(diffEl, printBtn);
    else bd.appendChild(diffEl);
  }
  diffEl.innerHTML = `
    <div class="diff-box-title">📊 施工前後差異</div>
    <div class="diff-row header"><span>項目</span><span style="text-align:right">施工前</span><span style="text-align:right">施工後</span><span style="text-align:right">差異</span></div>
    <div class="diff-row"><span>面積 (m²)</span><span class="diff-val">${n(ta,1)}</span><span class="diff-val" style="color:#16a34a">${n(ba,1)}</span><span class="diff-val ${cls(da)}">${fmtDiff(da,1)}</span></div>
    <div class="diff-row"><span>噸數 (T)</span><span class="diff-val">${n(tt)}</span><span class="diff-val" style="color:#16a34a">${n(bt)}</span><span class="diff-val ${cls(dt)}">${fmtDiff(dt)}</span></div>`;
}

function copyBeforeToAfter(recId) {
  const rec = gr(recId); if (!rec) return;
  if (rec.afterRows && rec.afterRows.length > 0) {
    if (!confirm('施工後已有資料，確定要覆蓋並複製施工前路段嗎？')) return;
  }
  rec.afterRows = rec.rows.map(r => ({
    id: Date.now() + Math.random()*10000|0,
    segment: r.segment || '', area: r.area || 0, thickness: r.thickness || ''
  }));
  persistRecord(rec);
  const tbody = document.getElementById(`atb-${recId}`);
  if (tbody) tbody.innerHTML = rec.afterRows.map((r,i) => renderAfterRow(rec,r,i)).join('');
  updAfterTots(recId);
  showToast('已複製施工前路段 ✓', 'success');
}

// ══════════════════════════════════════════
//  CARD INTERACTIONS
// ══════════════════════════════════════════
function toggle(id) {
  const bd = document.getElementById(`bd-${id}`);
  const ch = document.getElementById(`ch-${id}`);
  const cd = document.getElementById(`card-${id}`);
  if (!bd) return;
  const open = bd.classList.toggle('open');
  if (cd) cd.classList.toggle('active', open);
  if (ch) ch.style.transform = open ? 'rotate(180deg)' : '';
}

function gr(id) { return records.find(r => r.id === id); }

function uf(id, field, val) {
  const rec = gr(id); if (!rec) return;
  rec[field] = val; persistRecord(rec);
  if (field==='shift') { const e=document.getElementById(`ts-${id}`); if(e) e.textContent=val||'--'; }
  if (field==='zone') {
    const e=document.getElementById(`tz-${id}`); if(e) e.textContent=val||'未填工區路段';
    const l=document.getElementById(`tl-${id}`); if(l) l.textContent=`📊 施工路段明細 — ${val||''}`;
  }
}

function uDate(id, val) {
  const rec = gr(id); if (!rec) return;
  rec.date = val; rec.weekday = weekday(val); persistRecord(rec);
  const td=document.getElementById(`td-${id}`); if(td) td.textContent=val||'--';
  const tw=document.getElementById(`tw-${id}`); if(tw) tw.textContent=rec.weekday;
  const wi=document.getElementById(`wi-${id}`); if(wi) wi.value=rec.weekday;
}

function uShift(id, val, btn) {
  const rec = gr(id); if (!rec) return;
  rec.shift = val; persistRecord(rec);
  const tag = document.getElementById(`ts-${id}`); if (tag) tag.textContent = val;
  const panel = btn.closest('.shift-toggle');
  if (panel) panel.querySelectorAll('.shift-btn').forEach(b => {
    b.className = 'shift-btn';
    if (b === btn) b.classList.add(val === '日間' ? 'active-day' : 'active-night');
  });
}

function uMat(id, sel) {
  if (sel.value==='__manage__') { openMatMo(); const r=gr(id); if(r) sel.value=r.material; return; }
  uf(id, 'material', sel.value);
}

function uCaseField(id, field, val) {
  if (field === 'caseLocation' && val === '__addloc__') {
    openLocMo(); const rec=gr(id); const sel=document.getElementById(`cl-${id}`); if(sel&&rec) sel.value=rec.caseLocation||locations[0]||''; return;
  }
  const rec = gr(id); if (!rec) return;
  rec[field] = val;
  const badge = document.getElementById(`tcn-${id}`); if (badge) badge.textContent = buildCaseNumLabel(rec);
  if (field === 'caseLocation') { const lb=document.getElementById(`tloc-${id}`); if(lb) lb.textContent=val; }
  persistRecord(rec);
}

function urf(recId, rowId, field, val) {
  const rec=gr(recId); if(!rec) return;
  const row=rec.rows.find(r=>r.id===rowId); if(row) { row[field]=val; persistRecord(rec); }
}

function urA(recId, rowId, input) {
  const rec=gr(recId); if(!rec) return;
  const row=rec.rows.find(r=>r.id===rowId); if(!row) return;
  row.area=parseFloat(input.value)||0; refreshRow(recId,rowId,row); updTots(recId); persistRecord(rec);
}

function urT(recId, rowId, val) {
  const rec=gr(recId); if(!rec) return;
  const row=rec.rows.find(r=>r.id===rowId); if(!row) return;
  row.thickness=val; refreshRow(recId,rowId,row); updTots(recId); persistRecord(rec);
}

function refreshRow(recId, rowId, row) {
  const a=+row.area||0, t=row.thickness||'';
  const tEl=document.getElementById(`tn-${recId}-${rowId}`); if(tEl) tEl.textContent=a&&t?calcTons(a,t).toFixed(2):'';
  const mEl=document.getElementById(`mn-${recId}-${rowId}`); if(mEl) mEl.textContent=a&&t?calcMill(a,t).toFixed(2):'';
}

function updTots(rId) {
  const rec=gr(rId); if(!rec) return;
  const ta=recTot(rec,'area'), tt=recTot(rec,'tons'), tm=recTot(rec,'mill');
  const g=id=>document.getElementById(id);
  if(g(`ta-${rId}`)) g(`ta-${rId}`).textContent=n(ta,1);
  if(g(`tt-${rId}`)) g(`tt-${rId}`).textContent=n(tt);
  if(g(`tm-${rId}`)) g(`tm-${rId}`).textContent=n(tm);
  if(g(`sa-${rId}`)) g(`sa-${rId}`).textContent=n(ta,1);
  if(g(`st-${rId}`)) g(`st-${rId}`).textContent=n(tt);
  if(g(`sm-${rId}`)) g(`sm-${rId}`).textContent=n(tm);
  // update collapsed grid
  const csA=g(`cs-a-${rId}`); if(csA) csA.textContent=n(ta,1);
  const csT=g(`cs-t-${rId}`); if(csT) csT.textContent=n(tt);
  const csM=g(`cs-m-${rId}`); if(csM) csM.textContent=n(tm);
}

function addRow(recId) {
  const rec=gr(recId); if(!rec) return;
  const nid=Date.now();
  rec.rows.push({id:nid,segment:'',area:0,thickness:'',signs:''});
  const tbody=document.getElementById(`tb-${recId}`);
  if(tbody){
    const tr=document.createElement('tr'); tr.id=`tr-${recId}-${nid}`;
    tr.innerHTML=renderRow(rec,rec.rows[rec.rows.length-1],rec.rows.length-1).replace(/^<tr[^>]*>|<\/tr>$/g,'');
    tbody.appendChild(tr); reindex(recId);
  }
  updTots(recId); persistRecord(rec);
}

function delRow(recId, rowId) {
  const rec=gr(recId); if(!rec) return;
  rec.rows=rec.rows.filter(r=>r.id!==rowId);
  const el=document.getElementById(`tr-${recId}-${rowId}`); if(el) el.remove();
  reindex(recId); updTots(recId); persistRecord(rec);
}

function reindex(rId) {
  const tbody=document.getElementById(`tb-${rId}`); if(!tbody) return;
  tbody.querySelectorAll('tr').forEach((tr,i)=>{const c=tr.querySelector('.cr');if(c)c.textContent=i+1;});
}

function updSignCount(recId) {
  const rec=gr(recId); if(!rec) return;
  const total=(rec.rows||[]).reduce((s,r)=>s+(+r.signs||0),0);
  const el=document.getElementById(`sign-count-${recId}`);
  if(el){el.textContent=total>0?`📋 ${total}`:'';el.style.display=total>0?'':'none';}
  const hdr=document.getElementById(`sign-hdr-${recId}`);
  if(hdr){if(total>0){hdr.textContent=`📋 ${total}`;hdr.style.display='';}else{hdr.style.display='none';}}
  const tbl=document.getElementById(`ts-sign-${recId}`);
  if(tbl) tbl.textContent=total>0?total+'張':'';
}

// ══════════════════════════════════════════
//  RECORD DELETE
// ══════════════════════════════════════════
function askDel(id){delTarget=id;document.getElementById('delMo').classList.add('open');}
function closeDelMo(){document.getElementById('delMo').classList.remove('open');delTarget=null;delCaseTarget=null;}
async function confirmDel(){
  if(delTarget!=null){await removeRecord(delTarget);delTarget=null;}
  else if(delCaseTarget!=null){await removeCase(delCaseTarget);delCaseTarget=null;}
  closeDelMo();render();showToast('已刪除','error');
}

// ══════════════════════════════════════════
//  LOCK / UNLOCK
// ══════════════════════════════════════════
function toggleLock(id) {
  const rec=gr(id); if(!rec) return;
  rec.locked=!rec.locked;
  if(!rec.locked) rec.acceptDate='';
  persistRecord(rec);
  render();
  showToast(rec.locked?'✅ 已標記為完工':'🔓 已取消完工','success');
}

// ══════════════════════════════════════════
//  LONG PRESS / CONTEXT MENU
// ══════════════════════════════════════════
let _lpTimer=null, _ctxId=null;
function startLongPress(e,id){cancelLongPress();_lpTimer=setTimeout(()=>openCtx(e,id),550);}
function cancelLongPress(){clearTimeout(_lpTimer);_lpTimer=null;}
function openCtx(e,id){
  cancelLongPress();_ctxId=id;
  const rec=gr(id);
  const menu=document.getElementById('ctxMenu');
  const overlay=document.getElementById('ctxOverlay');
  const lockLabel=document.getElementById('ctxLockLabel');
  if(lockLabel) lockLabel.textContent=rec&&rec.locked?'取消完工':'標記完工';
  const x=e.clientX||(e.touches&&e.touches[0].clientX)||window.innerWidth/2;
  const y=e.clientY||(e.touches&&e.touches[0].clientY)||window.innerHeight/2;
  menu.style.left=Math.min(x,window.innerWidth-200)+'px';
  menu.style.top=Math.min(y,window.innerHeight-180)+'px';
  menu.classList.add('show'); overlay.classList.add('show');
  if(navigator.vibrate) navigator.vibrate(30);
}
function closeCtx(){document.getElementById('ctxMenu').classList.remove('show');document.getElementById('ctxOverlay').classList.remove('show');_ctxId=null;}
function ctxAction(action){
  const id=_ctxId; closeCtx(); if(!id) return;
  if(action==='copy') copyRecord(id);
  if(action==='lock') toggleLock(id);
  if(action==='preview') openPreview(id);
  if(action==='delete') askDel(id);
}

// ══════════════════════════════════════════
//  COPY RECORD
// ══════════════════════════════════════════
function copyRecord(id) {
  const src=gr(id); if(!src) return;
  const nid=Date.now();
  const d=new Date();
  const copy=JSON.parse(JSON.stringify(src));
  copy.id=nid;
  copy.date=`${d.getFullYear()-1911}/${d.getMonth()+1}/${d.getDate()}`;
  copy.weekday=WEEKDAYS[d.getDay()];
  copy.locked=false;
  copy.rows=copy.rows.map(r=>({...r,id:Date.now()+Math.random()*1000|0}));
  records.push(copy);
  persistRecord(copy);render();
  setTimeout(()=>{toggle(nid);const el=document.getElementById(`card-${nid}`);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},80);
  showToast('已複製派案 ✓','success');
}

// ══════════════════════════════════════════
let batchMode=false, batchSelected=new Set();
function enterBatchMode(){
  batchMode=true;batchSelected.clear();
  document.getElementById('batchBar').classList.add('show');
  document.getElementById('batchCount').textContent='已選 0 筆';
  document.querySelectorAll('.card-check').forEach(el=>el.classList.add('show'));
  showToast('點選卡片勾選，再按列印','');
}
function exitBatchMode(){
  batchMode=false;batchSelected.clear();
  document.getElementById('batchBar').classList.remove('show');
  document.querySelectorAll('.card-check').forEach(el=>el.classList.remove('show','checked'));
}
function toggleBatchSelect(id,el){
  if(!batchMode) return;
  if(batchSelected.has(id)){batchSelected.delete(id);el.classList.remove('checked');}
  else{batchSelected.add(id);el.classList.add('checked');}
  document.getElementById('batchCount').textContent=`已選 ${batchSelected.size} 筆`;
}
function selectAllBatch(){
  records.forEach(rec=>{batchSelected.add(rec.id);const el=document.getElementById(`chk-${rec.id}`);if(el)el.classList.add('checked');});
  document.getElementById('batchCount').textContent=`已選 ${batchSelected.size} 筆`;
}
function buildRecHtml(rec){
  const ta=recTot(rec,'area'),tt=recTot(rec,'tons'),tm=recTot(rec,'mill');
  const rowsHtml=rec.rows.map((row,i)=>{const a=+row.area||0,t=row.thickness||'';const tons=a&&t?calcTons(a,t).toFixed(2):'—';const mill=a&&t?calcMill(a,t).toFixed(2):'—';
    return '<tr><td style="text-align:center">'+(i+1)+'</td><td>'+eh(row.segment||'')+'</td><td style="text-align:center">'+(a||'—')+'</td><td style="text-align:center">'+(t||'—')+'</td><td style="text-align:center">'+tons+'</td><td style="text-align:center">'+mill+'</td></tr>';}).join('');
  return `<div class="p-wrap"><div class="p-header"><div><div class="p-title">🏗️ ${eh(buildCaseNo(rec))} 施工面積記錄</div><div class="p-subtitle">${eh(rec.zone||'')}${rec.material?'　料別：'+eh(rec.material):''}</div></div><div class="p-logo">📋</div></div>
    <div class="p-info"><div class="p-info-item"><div class="p-info-label">日期</div><div class="p-info-val">${eh(rec.date||'—')}</div></div><div class="p-info-item"><div class="p-info-label">星期</div><div class="p-info-val">${eh(rec.weekday||'—')}</div></div><div class="p-info-item"><div class="p-info-label">日/夜</div><div class="p-info-val">${eh(rec.shift||'—')}</div></div><div class="p-info-item"><div class="p-info-label">前置</div><div class="p-info-val">${eh(rec.prepare||'—')}</div></div><div class="p-info-item"><div class="p-info-label">刨除</div><div class="p-info-val">${eh(rec.milling||'—')}</div></div><div class="p-info-item"><div class="p-info-label">鋪設</div><div class="p-info-val">${eh(rec.paving||'—')}</div></div></div>
    <div class="p-tbl-title">📊 施工路段明細</div>
    <table><thead><tr><th style="width:44px">順序</th><th>施工路段</th><th style="width:76px">面積(m²)</th><th style="width:70px">厚度(cm)</th><th style="width:76px">噸數(T)</th><th style="width:80px">刨除(-0.5)</th></tr></thead>
    <tbody>${rowsHtml}<tr class="sub-row"><td colspan="2" style="text-align:right;padding-right:12px;font-size:13px">合計</td><td style="text-align:center">${n(ta,1)}</td><td></td><td style="text-align:center">${n(tt)}</td><td style="text-align:center">${n(tm)}</td></tr></tbody></table>
    <div class="p-summary"><div class="p-sum-box highlight"><div class="p-sum-label">總面積</div><div><span class="p-sum-val">${n(ta,1)}</span><span class="p-sum-unit">m²</span></div></div><div class="p-sum-box highlight"><div class="p-sum-label">總噸數</div><div><span class="p-sum-val">${n(tt)}</span><span class="p-sum-unit">T</span></div></div></div></div>`;
}
function doBatchPrint(){
  if(batchSelected.size===0){showToast('請先勾選要列印的記錄','error');return;}
  const selectedRecs=records.filter(r=>batchSelected.has(r.id)).sort((a,b)=>{const da=parseDate(a.date),db=parseDate(b.date);return(da?da.getTime():0)-(db?db.getTime():0);});
  const recPages=selectedRecs.map((rec,i)=>`<div style="${i>0?'page-break-before:always;':''}padding:0">${buildRecHtml(rec)}</div>`).join('');
  const pa=document.getElementById('print-area');

-box.highlight{border-color:#1e3a6e;background:#f0f4ff;}.p-sum-label{font-size:15px;font-weight:700;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}.p-sum-val{font-size:36px;font-weight:900;color:#1e3a6e;}.p-sum-unit{font-size:18px;color:#94a3b8;margin-left:2px;}.p-footer{display:none;}</style>${recPages}`;

:16px;}.p-sum-box{border:2px solid #e2e8f0;border-radius:8px;padding:14px 16px;text-align:center;}.p-sum-box.highlight{border-color:#1e3a6e;background:#f0f4ff;}.p-sum-label{font-size:15px;font-weight:700;color:#64748b;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}.p-sum-val{font-size:36px;font-weight:900;color:#1e3a6e;}.p-sum-unit{font-size:18px;color:#94a3b8;margin-left:2px;}.p-footer{display:none;}</style>
  <div class="p-wrap">
    <div class="p-header"><div><div class="p-title">🏗️ ${eh(buildCaseNo(rec))} 施工面積記錄</div><div class="p-subtitle">${eh(rec.zone||'')}${rec.material?'　　料別：'+eh(rec.material):''}</div></div><div class="p-logo">📋</div></div>
    <div class="p-info">
      <div class="p-info-item"><div class="p-info-label">日期</div><div class="p-info-val">${eh(rec.date||'—')}</div></div>

// ══════════════════════════════════════════
//  STATS MODAL
// ══════════════════════════════════════════
function openStatsModal(){
  const grid=document.getElementById('statsGrid');
  if(!cases.length){grid.innerHTML='<div style="color:var(--text-dim);font-size:13px;padding:10px">尚無記錄</div>';document.getElementById('statsMo').classList.add('open');return;}
  const map={};
  cases.forEach(c=>{
    const key=buildCaseNo({caseLocation:c.caseLocation,caseNum:c.caseNum})||'未命名';
    const recs=getCaseRecords(c.id);
    const area=recs.reduce((s,r)=>s+recTot(r,'area'),0);
    const tons=recs.reduce((s,r)=>s+recTot(r,'tons'),0);
    map[key]={name:key,area,tons,count:recs.length};
  });
  const list=Object.values(map).sort((a,b)=>b.area-a.area);
  const totArea=list.reduce((s,r)=>s+r.area,0);
  const totTons=list.reduce((s,r)=>s+r.tons,0);
  grid.innerHTML=list.map(r=>`<div class="stats-row"><div><div class="stats-row-name">${eh(r.name)}</div><div style="font-size:11px;color:var(--text-dim);margin-top:2px">${r.count} 筆記錄</div></div><div class="stats-row-area">${r.area.toFixed(1)} m²</div><div class="stats-row-tons">${r.tons.toFixed(2)} T</div></div>`).join('')+`<div class="stats-total"><div style="font-size:14px;font-weight:800;color:var(--accent)">合計</div><div class="stats-row-area" style="font-size:15px">${totArea.toFixed(1)} m²</div><div class="stats-row-tons" style="font-size:15px">${totTons.toFixed(2)} T</div></div>`;
  document.getElementById('statsMo').classList.add('open');
}
function closeStatsMo(){document.getElementById('statsMo').classList.remove('open');}

// ══════════════════════════════════════════
//  MATERIAL MODAL
// ══════════════════════════════════════════
function openMatMo(){renderMatList();document.getElementById('matMo').classList.add('open');}
function closeMatMo(){document.getElementById('matMo').classList.remove('open');render();}
function renderMatList(){document.getElementById('matList').innerHTML=materials.length?materials.map((m,i)=>`<div class="mat-item"><span>${eh(m)}</span><button class="mat-del" onclick="removeMat(${i})">×</button></div>`).join(''):`<div style="color:var(--text-dim);font-size:12px;padding:5px">尚無料別</div>`;}
function addMat(){const inp=document.getElementById('matInp'),v=inp.value.trim();if(!v)return;if(materials.includes(v)){showToast('料別已存在','error');return;}materials.push(v);persistMats();inp.value='';renderMatList();showToast(`已新增「${v}」`,'success');}
function removeMat(i){const nm=materials.splice(i,1)[0];persistMats();renderMatList();showToast(`已刪除「${nm}」`);}

// Location modal
function openLocMo(cardId){_locCallerCardId=cardId||null;renderLocList();document.getElementById('locMo').classList.add('open');}
function closeLocMo(){document.getElementById('locMo').classList.remove('open');render();}
function renderLocList(){document.getElementById('locList').innerHTML=locations.length?locations.map((l,i)=>`<div class="mat-item"><span>${eh(l)}</span><button class="mat-del" onclick="removeLoc(${i})" ${locations.length<=1?'disabled style="opacity:.3"':''}>×</button></div>`).join(''):`<div style="color:var(--text-dim);font-size:12px;padding:5px">尚無地點</div>`;}
function addLoc(){const inp=document.getElementById('locInp'),v=inp.value.trim();if(!v)return;if(locations.includes(v)){showToast('地點已存在','error');return;}locations.push(v);saveLocal();inp.value='';renderLocList();showToast(`已新增「${v}」`,'success');}
function removeLoc(i){if(locations.length<=1){showToast('至少保留一個地點','error');return;}const nm=locations.splice(i,1)[0];saveLocal();renderLocList();showToast(`已刪除「${nm}」`);}

// ══════════════════════════════════════════
//  SORT
// ══════════════════════════════════════════
let currentSort='date-desc';
function setSort(s,el){currentSort=s;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderFiltered();}
function getSorted(arr){return[...arr].sort((a,b)=>{const da=parseDate(a.date),db=parseDate(b.date);const ta2=da?da.getTime():0,tb=db?db.getTime():0;return currentSort==='date-desc'?tb-ta2:ta2-tb;});}


// ══════════════════════════════════════════
//  OFFLINE
// ══════════════════════════════════════════
function updateOfflineBanner(){const banner=document.getElementById('offlineBanner');if(!banner)return;if(!navigator.onLine)banner.classList.add('show');else{banner.classList.remove('show');if(fbConnected)updateSyncUI('synced');}}
window.addEventListener('online',()=>{updateOfflineBanner();showToast('網路已恢復 ✓','success');});
window.addEventListener('offline',()=>{updateOfflineBanner();showToast('已離線，資料暫存本機','error');});

//  STATS
// ══════════════════════════════════════════
function updateStats(){
  const el=document.getElementById('stR');
  if(el) el.textContent=cases.length+'個派案 / '+records.length+'筆';
}

// ══════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════
function today(){const d=new Date();return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;}
function eh(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ea(s){return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
let toastT;
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast show ${type}`;clearTimeout(toastT);toastT=setTimeout(()=>t.className='toast',2500);}

// Modal click-outside
['matMo','delMo','statsMo','locMo'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){
    if(e.target===this){if(this.id==='matMo')closeMatMo();else if(this.id==='delMo')closeDelMo();else if(this.id==='locMo')closeLocMo();else closeStatsMo();}
  });
});
document.getElementById('previewMo').addEventListener('click',e=>{if(e.target===e.currentTarget)closePreview();});

// Scroll to top
window.addEventListener('scroll',()=>{const btn=document.getElementById('toTop');if(!btn)return;if(window.scrollY>300)btn.classList.add('show');else btn.classList.remove('show');},{passive:true});

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
loadLocal();
render();
initFirebase().then(updateSyncUI).catch(()=>updateSyncUI());
updateOfflineBanner();
</script>
