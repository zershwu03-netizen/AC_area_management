<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>施工面積管理</title>
<style>
:root{
  --bg:#f0f4f8;--surface:#ffffff;--surface2:#f5f7fa;--border:#dde3ec;
  --accent:#2563eb;--accent2:#d97706;--text:#1e293b;--text-dim:#64748b;
  --danger:#dc2626;--success:#16a34a;--header-bg:#ffffff;
  --row-odd:#ffffff;--row-even:#f8fafc;--input-bg:#f8fafc;
  --font:'Microsoft YaHei','PingFang TC','Noto Sans TC',sans-serif;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.1),0 1px 4px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

.topbar{background:var(--header-bg);border-bottom:1px solid var(--border);box-shadow:var(--shadow);padding:11px 13px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:7px;}
.topbar-title{font-size:15px;font-weight:800;letter-spacing:.5px;color:var(--accent);white-space:nowrap;}
.topbar-right{display:flex;gap:6px;align-items:center;flex-shrink:0;}

.btn{display:flex;align-items:center;gap:4px;padding:7px 12px;border-radius:8px;border:none;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-success{background:#16a34a;color:#fff;}.btn-success:active{background:#15803d;}
.btn-warn{background:var(--accent2);color:#fff;}.btn-warn:active{opacity:.85;}
.btn-danger{background:var(--danger);color:#fff;}.btn-danger:active{opacity:.85;}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}.btn-ghost:active{background:var(--border);}
.btn svg{width:13px;height:13px;flex-shrink:0;}

.sync-pill{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);cursor:pointer;white-space:nowrap;}
.sync-pill.ok{color:var(--success);border-color:rgba(22,163,74,.4);background:rgba(22,163,74,.06);}
.sync-pill.err{color:var(--danger);border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.05);}
.sync-pill.syncing{color:#d97706;border-color:rgba(217,119,6,.4);background:rgba(217,119,6,.06);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}

.main{padding:11px;max-width:800px;margin:0 auto;}
.section-label{font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);margin-bottom:7px;padding-left:2px;}
.records-list{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}

.stats-bar{display:flex;gap:7px;margin-bottom:11px;}
.stat-chip{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;box-shadow:var(--shadow);}
.stat-chip .val{font-size:22px;font-weight:700;color:var(--accent);}
.stat-chip .lbl{font-size:14px;color:var(--text-dim);margin-top:1px;}

.record-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);transition:border-color .2s,box-shadow .2s;}
.record-card.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12),var(--shadow);}
.record-card-header{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;cursor:pointer;gap:7px;background:var(--surface);}
.record-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;flex:1;min-width:0;}
.tag{font-size:14px;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);white-space:nowrap;}
.tag.accent{background:#eff6ff;color:#2563eb;border-color:#bfdbfe;}
.tag.warn{background:#fffbeb;color:#d97706;border-color:#fde68a;}
.record-title{font-size:12px;font-weight:700;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.record-actions{display:flex;gap:4px;flex-shrink:0;}
/* shift toggle buttons */
.shift-toggle{display:flex;gap:5px;}
.shift-btn{flex:1;padding:9px 0;border-radius:7px;border:1.5px solid var(--border);background:var(--surface2);font-family:var(--font);font-size:15px;font-weight:600;color:var(--text-dim);cursor:pointer;text-align:center;transition:all .18s;}
.shift-btn.active-day{background:#fffbeb;border-color:#f59e0b;color:#d97706;}
.shift-btn.active-night{background:#eff6ff;border-color:#3b82f6;color:#2563eb;}
/* location badge in header — distinct from case badge */
.card-loc-badge{font-size:15px;font-weight:800;color:#fff;background:var(--accent);border-radius:5px;padding:2px 8px;white-space:nowrap;flex-shrink:0;letter-spacing:.5px;}
.card-summary{display:flex;flex-direction:column;gap:6px;padding:8px 13px 10px;border-top:1px solid var(--border);background:var(--surface2);}
.card-sum-item{display:flex;align-items:baseline;gap:3px;}
.card-sum-label{font-size:14px;color:var(--text-dim);}
.card-sum-val{font-size:18px;font-weight:700;color:var(--accent);}
.card-sum-unit{font-size:14px;color:var(--text-dim);}
.card-case-badge{font-size:15px;font-weight:700;color:var(--accent);background:#eff6ff;border:1px solid #bfdbfe;border-radius:5px;padding:2px 7px;white-space:nowrap;flex-shrink:0;}
.icon-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:7px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;color:var(--text-dim);transition:all .15s;}
.icon-btn:active{background:var(--border);}
.icon-btn.del:active{background:var(--danger);color:#fff;}

.record-body{display:none;padding:12px 13px 13px;flex-direction:column;gap:8px;border-top:1px solid var(--border);}
.record-body.open{display:flex;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.info-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.fg{display:flex;flex-direction:column;gap:3px;}
.fl{font-size:13px;font-weight:700;letter-spacing:.4px;color:var(--text-dim);text-transform:uppercase;}
.fi,.fs{background:var(--input-bg);border:1.5px solid var(--border);border-radius:7px;padding:8px 8px;font-family:var(--font);font-size:17px;color:var(--text);width:100%;-webkit-appearance:none;appearance:none;transition:border-color .15s;}
.fi:focus,.fs:focus{outline:none;border-color:var(--accent);background:#fff;}
.fi[readonly]{background:var(--surface2);cursor:default;color:var(--accent);font-weight:600;}
.sw{position:relative;}.sw::after{content:'▾';position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-dim);font-size:11px;}
.sw .fs{padding-right:24px;}

.add-card{background:var(--surface);border:2px dashed var(--border);border-radius:11px;padding:14px;text-align:center;cursor:pointer;color:var(--text-dim);font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:14px;transition:border-color .2s,background .2s,color .2s;box-shadow:var(--shadow);}
.add-card:active{border-color:var(--accent);background:#eff6ff;color:var(--accent);}

/* TABLE */
.tbl-section{margin-top:2px;}
.tbl-label{font-size:15px;font-weight:700;color:var(--accent2);margin-bottom:6px;padding:5px 9px;background:#fffbeb;border-radius:5px;border-left:3px solid var(--accent2);}
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border);}
table.dt{width:100%;border-collapse:collapse;min-width:490px;}
table.dt th{background:#f1f5f9;color:var(--text-dim);font-size:15px;font-weight:700;letter-spacing:.4px;padding:8px 4px;text-align:center;border-bottom:2px solid var(--border);white-space:nowrap;}
table.dt td{padding:5px 3px;border-bottom:1px solid var(--border);font-size:15px;text-align:center;vertical-align:middle;}
table.dt tbody tr:nth-child(odd) td{background:var(--row-odd);}
table.dt tbody tr:nth-child(even) td{background:var(--row-even);}
table.dt tbody tr:last-child td{border-bottom:none;}
.ci{background:transparent;border:1.5px solid transparent;border-radius:5px;padding:5px 3px;font-family:var(--font);font-size:15px;color:var(--text);width:100%;text-align:center;transition:border-color .15s,background .15s;min-width:44px;}
.ci:focus{outline:none;border-color:var(--accent);background:#fff;}
.ci.seg{min-width:100px;text-align:left;}
.cr{font-size:15px;color:var(--accent2);font-weight:700;padding:4px 2px;}
.cr.dim{color:var(--text-dim);font-weight:400;}

.total-row td{background:#eff6ff !important;font-weight:700;color:var(--accent);}
.summary-row td{background:#dbeafe !important;font-weight:700;color:var(--text);}

.add-row-btn{width:100%;padding:7px;border-radius:7px;border:1.5px dashed var(--border);background:transparent;color:var(--text-dim);font-family:var(--font);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;margin-top:6px;transition:all .15s;}
.add-row-btn:active{border-color:var(--accent);color:var(--accent);}
.del-row-btn{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;font-size:14px;line-height:1;margin:0 auto;transition:all .15s;}
.del-row-btn:active{background:var(--danger);color:#fff;border-color:var(--danger);}

/* MODALS */
.mo{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:200;align-items:center;justify-content:center;padding:14px;}
.mo.open{display:flex;}
.md{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 18px;max-width:400px;width:100%;box-shadow:var(--shadow-md);display:flex;flex-direction:column;gap:12px;max-height:88vh;}
.md h3{font-size:14px;font-weight:700;color:var(--text);}
.md-actions{display:flex;gap:7px;}
.md-actions .btn{flex:1;justify-content:center;}
.mat-list{display:flex;flex-direction:column;gap:5px;overflow-y:auto;max-height:200px;}
.mat-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;gap:6px;}
.mat-item span{font-size:13px;flex:1;color:var(--text);}
.mat-del{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text-dim);cursor:pointer;font-size:15px;line-height:1;border-radius:5px;}
.mat-del:active{color:var(--danger);}
.add-mat{display:flex;gap:6px;}
.add-mat input{flex:1;background:var(--input-bg);border:1.5px solid var(--border);border-radius:7px;padding:8px 8px;font-family:var(--font);font-size:13px;color:var(--text);}
.add-mat input:focus{outline:none;border-color:var(--accent);}

/* FB Config */
.fb-hint{font-size:11px;color:var(--text-dim);line-height:1.65;background:var(--surface2);border-radius:7px;padding:9px 10px;border:1px solid var(--border);}
.fb-hint a{color:var(--accent);}
.fb-fields{display:flex;flex-direction:column;gap:7px;overflow-y:auto;max-height:52vh;}
.fb-row{display:flex;flex-direction:column;gap:2px;}
.fb-row label{font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:.4px;text-transform:uppercase;}
.fb-row input{background:var(--input-bg);border:1.5px solid var(--border);border-radius:7px;padding:8px 8px;font-family:var(--font);font-size:12px;color:var(--text);width:100%;}
.fb-row input:focus{outline:none;border-color:var(--accent);}
.fb-status{font-size:12px;padding:7px 10px;border-radius:7px;font-weight:600;}
.fb-status.connected{background:#f0fdf4;color:var(--success);border:1px solid #bbf7d0;}
.fb-status.disconnected{background:#fef2f2;color:var(--danger);border:1px solid #fecaca;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);border-radius:9px;padding:10px 16px;font-size:13px;font-weight:600;color:#fff;z-index:999;transition:transform .28s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:var(--shadow-md);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--success);}
.toast.error{background:var(--danger);}

.btn-print{background:#2563eb;color:#fff;font-size:12px;font-weight:600;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .18s;}
.btn-print:active{background:#1d4ed8;}
.btn-print svg{width:14px;height:14px;}


/* SEARCH BAR */
.search-bar{display:flex;gap:7px;margin-bottom:10px;align-items:center;}
.search-input{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-family:var(--font);font-size:14px;color:var(--text);box-shadow:var(--shadow);}
.search-input:focus{outline:none;border-color:var(--accent);}
.filter-btn{display:flex;align-items:center;gap:4px;padding:9px 12px;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-family:var(--font);font-size:13px;font-weight:600;color:var(--text-dim);cursor:pointer;white-space:nowrap;box-shadow:var(--shadow);}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:#eff6ff;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.filter-tag{padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--text-dim);cursor:pointer;transition:all .15s;}
.filter-tag.active{border-color:var(--accent);color:var(--accent);background:#eff6ff;}

/* OFFLINE BANNER */
.offline-banner{display:none;background:#fef3c7;border:1.5px solid #f59e0b;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:600;color:#92400e;margin-bottom:10px;align-items:center;gap:8px;}
.offline-banner.show{display:flex;}

/* STATS MODAL */
.stats-grid{display:flex;flex-direction:column;gap:8px;overflow-y:auto;max-height:60vh;}
.stats-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;}
.stats-row-name{font-size:14px;font-weight:700;color:var(--text);}
.stats-row-area{font-size:13px;font-weight:700;color:var(--accent);text-align:right;white-space:nowrap;}
.stats-row-tons{font-size:13px;font-weight:700;color:var(--accent2);text-align:right;white-space:nowrap;}
.stats-total{display:grid;grid-template-columns:1fr auto auto;gap:10px;padding:11px 12px;background:#eff6ff;border:2px solid var(--accent);border-radius:8px;margin-top:4px;}
.stats-col-hdr{font-size:11px;font-weight:700;color:var(--text-dim);text-align:right;letter-spacing:.5px;text-transform:uppercase;}

/* SORT BAR */
.sort-bar{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.sort-label{font-size:12px;color:var(--text-dim);font-weight:600;flex-shrink:0;}
.sort-btn{padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--text-dim);cursor:pointer;transition:all .15s;white-space:nowrap;}
.sort-btn.active{border-color:var(--accent);color:var(--accent);background:#eff6ff;}

/* LOCKED CARD */
.record-card.locked{border-color:#94a3b8 !important;opacity:.85;}
.locked-badge{font-size:10px;font-weight:700;color:#166534;background:#dcfce7;border:1px solid #86efac;border-radius:4px;padding:2px 6px;white-space:nowrap;flex-shrink:0;}

/* LONG-PRESS MENU */
.ctx-menu{display:none;position:fixed;z-index:300;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.15);min-width:180px;overflow:hidden;}
.ctx-menu.show{display:block;}
.ctx-item{display:flex;align-items:center;gap:10px;padding:13px 16px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;transition:background .12s;}
.ctx-item:active{background:var(--surface2);}
.ctx-item.danger{color:var(--danger);}
.ctx-item svg{width:16px;height:16px;flex-shrink:0;}
.ctx-overlay{display:none;position:fixed;inset:0;z-index:299;}
.ctx-overlay.show{display:block;}

/* PRINT PREVIEW MODAL */
.preview-mo{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:250;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
.preview-mo.open{display:flex;}
.preview-box{background:#fff;border-radius:14px;max-width:600px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;}
.preview-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #e2e8f0;background:#f8fafc;}
.preview-topbar span{font-size:14px;font-weight:700;color:#1e293b;}
.preview-actions{display:flex;gap:8px;}
.preview-content{padding:16px;overflow-x:auto;}

/* BATCH PRINT MODE */
.batch-bar{display:none;background:#1e3a6e;padding:10px 14px;border-radius:10px;margin-bottom:10px;align-items:center;justify-content:space-between;gap:10px;}
.batch-bar.show{display:flex;}
.batch-bar-left{display:flex;align-items:center;gap:8px;color:#fff;font-size:13px;font-weight:600;}
.batch-bar-right{display:flex;gap:7px;}
.batch-count{background:rgba(255,255,255,.2);border-radius:20px;padding:2px 10px;font-size:13px;font-weight:700;color:#fff;white-space:nowrap;}
.card-check{display:none;width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:#fff;cursor:pointer;flex-shrink:0;align-items:center;justify-content:center;transition:all .15s;}
.card-check.show{display:flex;}
.card-check.checked{background:var(--accent);border-color:var(--accent);}
.card-check.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:700;}
.batch-mode .record-card-header{padding-left:8px;}
/* ── PRINT STYLES ── */
@media print{
  body *{visibility:hidden;}
  #print-area,#print-area *{visibility:visible;}
  #print-area{
    position:fixed;inset:0;
    background:#fff;
    font-family:'Microsoft YaHei','PingFang TC',sans-serif;
    color:#000;
    padding:0;
  }
}
@media(max-width:390px){.info-grid-3{grid-template-columns:1fr 1fr;}.topbar-title{font-size:13px;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">📋 施工面積管理</div>
  <div class="topbar-right">
    <div class="sync-pill" id="syncPill" style="pointer-events:none;cursor:default">
      <div class="sync-dot"></div><span id="syncLabel">本地</span>
    </div>

  </div>
</div>

<div class="main">
  <div class="stats-bar" style="align-items:stretch">
    <div class="stat-chip"><div class="val" id="stR">0</div><div class="lbl">施工記錄筆數</div></div>
    <div class="stat-chip" onclick="openStatsModal()" style="cursor:pointer;border-color:var(--accent);background:#eff6ff">
      <div class="val" style="font-size:22px">📊</div>
      <div class="lbl" style="color:var(--accent)">派案統計</div>
    </div>
    <div class="stat-chip" onclick="enterBatchMode()" style="cursor:pointer;border-color:#1e3a6e;background:#f0f4ff">
      <div class="val" style="font-size:22px">🖨️</div>
      <div class="lbl" style="color:#1e3a6e">批次列印</div>
    </div>
  </div>

  <div class="offline-banner" id="offlineBanner">
    ⚠️ 目前離線中，資料已暫存於本機，連線後自動同步
  </div>

  <div class="search-bar">
    <input class="search-input" id="searchInp" placeholder="🔍 搜尋路段、派案名稱…" oninput="doSearch()" type="text" autocomplete="off" autocorrect="off" autocapitalize="off">
  </div>
  <div class="filter-row" id="filterRow">
    <span class="filter-tag active" data-filter="all" onclick="setFilter('all',this)">全部</span>
    <span class="filter-tag" data-filter="day" onclick="setFilter('day',this)">☀️ 日間</span>
    <span class="filter-tag" data-filter="night" onclick="setFilter('night',this)">🌙 夜間</span>
  </div>

  <div class="sort-bar">
    <span class="sort-label">排序：</span>
    <span class="sort-btn active" data-sort="date-desc" onclick="setSort('date-desc',this)">日期 新→舊</span>
    <span class="sort-btn" data-sort="date-asc"  onclick="setSort('date-asc',this)">日期 舊→新</span>
  </div>
  <div class="batch-bar" id="batchBar">
    <div class="batch-bar-left">
      🖨️ 批次列印模式
      <span class="batch-count" id="batchCount">已選 0 筆</span>
    </div>
    <div class="batch-bar-right">
      <button class="btn" style="background:rgba(255,255,255,.15);color:#fff;font-size:12px;padding:6px 12px" onclick="selectAllBatch()">全選</button>

<script>
// ══════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════
const STORE_KEY  = 'cr_v5';
const MAT_KEY    = 'mat_v2';
const LOC_KEY    = 'loc_v1';
const WEEKDAYS   = ['日','一','二','三','四','五','六'];
const DEF_MATS   = ['再生3/8"','再生3/4"','新料3/8"','新料3/4"','改三3/4"','改三1"'];
const DEF_LOCS   = ['板橋'];
const DENSITY    = 2.3;

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let records   = [];
let materials = [];
let locations = [];
let delTarget = null;
let fbApp     = null;
let fbDB      = null;
let fbUnsub   = null;
let fbConnected = false;

// ══════════════════════════════════════════
//  LOCAL STORAGE
// ══════════════════════════════════════════
function loadLocal() {
  try { records   = JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { records=[]; }
  try { materials = JSON.parse(localStorage.getItem(MAT_KEY))   || DEF_MATS.slice(); } catch { materials=DEF_MATS.slice(); }
  try { locations = JSON.parse(localStorage.getItem(LOC_KEY))   || DEF_LOCS.slice(); } catch { locations=DEF_LOCS.slice(); }
  if (!records.length) seedDemo();
}
function saveLocal() {
  localStorage.setItem(STORE_KEY, JSON.stringify(records));
  localStorage.setItem(MAT_KEY,   JSON.stringify(materials));
  localStorage.setItem(LOC_KEY,   JSON.stringify(locations));
}

function seedDemo() {
  records = [{
    id:Date.now(), caseLocation:'板橋', caseNum:'八',
    date:'115/3/8', weekday:'六',
    shift:'夜間', prepare:'21:30', milling:'22:00', paving:'23:00', zone:'重慶路245巷', material:'改三1"',
    rows:[
      {id:1,segment:'重慶路245巷至223巷',area:96,   thickness:'20'},
      {id:2,segment:'223巷口至221號',    area:124,  thickness:'20'},
      {id:3,segment:'221號至大豐街',     area:113.4,thickness:'20'},
      {id:4,segment:'大豐街至忠孝路',    area:403.2,thickness:'20'},
    ]
  }];
  saveLocal();
}
// 組合完整派案名稱（用於列印/Excel標題）
function buildCaseNo(rec) {
  const loc = rec.caseLocation || '';
  const num = rec.caseNum || '';
  if (!loc && !num) return '未命名派案';
  if (!num) return `${loc}派案`;
  return `${loc}第${num}派案`;
}
// 卡片 badge 只顯示編號部分（地點已由左邊 badge 顯示）
function buildCaseNumLabel(rec) {
  const num = rec.caseNum || '';
  if (!num) return '派案';
  return `第${num}派案`;
}

// ══════════════════════════════════════════
//  FIREBASE INIT (hardcoded config)
// ══════════════════════════════════════════
async function initFirebase() {
  const cfg = {
    apiKey:            "AIzaSyCzLwCL6nubH14f-l4Ss3jLGK2JREbvPOs",
    authDomain:        "ac-area-management.firebaseapp.com",
    projectId:         "ac-area-management",
    storageBucket:     "ac-area-management.firebasestorage.app",
    messagingSenderId: "94710107708",
    appId:             "1:94710107708:web:29efa5a0647bd54b5e7d39",
    measurementId:     "G-F4PESK6HKN"
  };

  try {
    const [fbApp_m, fbFS_m] = await Promise.all([
      import('https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js'),
      import('https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js'),
    ]);
    const { initializeApp, getApps, getApp } = fbApp_m;
    const { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } = fbFS_m;

    fbApp = getApps().length ? getApp() : initializeApp(cfg);
    fbDB  = getFirestore(fbApp);

    // Listen to records — 只在其他裝置有變動時才重新渲染
    if (fbUnsub) fbUnsub();
    fbUnsub = onSnapshot(collection(fbDB,'records'), snap => {
      // 如果是自己觸發的寫入，忽略這次 snapshot（避免重新渲染打斷輸入）
      if (window._suppressSnapshot) return;
      const docs = [];
      snap.forEach(d => docs.push(d.data()));
      docs.sort((a,b)=>(b.id||0)-(a.id||0));
      records = docs;
      saveLocal();
      render();
    }, err => { console.warn('Firestore error:', err); });

    // Listen to materials
    onSnapshot(doc(fbDB,'config','materials'), snap => {
      if (snap.exists()) { materials = snap.data().list||[]; saveLocal(); }
    });

    // Expose helpers
    window._fbSave = async (rec) => {
      window._suppressSnapshot = true;
      await setDoc(doc(fbDB,'records',String(rec.id)), JSON.parse(JSON.stringify(rec)));
      // 短暫延遲後解除，讓其他裝置的真實更新能正常進來
      clearTimeout(window._suppressTimer);
      window._suppressTimer = setTimeout(() => { window._suppressSnapshot = false; }, 1500);
    };
    window._fbDel = async (id) => {
      window._suppressSnapshot = true;
      await deleteDoc(doc(fbDB,'records',String(id)));
      clearTimeout(window._suppressTimer);
      window._suppressTimer = setTimeout(() => { window._suppressSnapshot = false; }, 1500);
    };
    window._fbSaveMats = async (list) => {
      await setDoc(doc(fbDB,'config','materials'), {list});
    };

    fbConnected = true;
    updateSyncUI();
    showToast('Firebase 已連線 🔥','success');
  } catch(e) {
    console.warn('Firebase init error:', e);
    fbConnected = false;
    updateSyncUI();
  }
}

function updateSyncUI(state) {
  const pill  = document.getElementById('syncPill');
  const label = document.getElementById('syncLabel');
  if (!fbConnected) {
    pill.className='sync-pill err'; label.textContent='本地模式'; return;
  }
  if (state === 'syncing') {
    pill.className='sync-pill syncing'; label.textContent='同步中…';
  } else if (state === 'synced') {
    pill.className='sync-pill ok'; label.textContent='✓ 已同步';
    // 3秒後回到「雲端連線」靜態狀態
    clearTimeout(window._syncTimer);
    window._syncTimer = setTimeout(()=>{
      pill.className='sync-pill ok'; label.textContent='雲端連線';
    }, 3000);
  } else {
    pill.className='sync-pill ok'; label.textContent='雲端連線';
  }
}

// ══════════════════════════════════════════
//  CRUD OPERATIONS (local + cloud)
// ══════════════════════════════════════════
async function persistRecord(rec) {
  const i = records.findIndex(r=>r.id===rec.id);
  if (i>=0) records[i]=rec; else records.unshift(rec);
  saveLocal(); updateStats();
  if (fbConnected && window._fbSave) {
    updateSyncUI('syncing');
    try {
      await window._fbSave(rec);
      updateSyncUI('synced');
    } catch(e) {
      showToast('雲端同步失敗','error');
      updateSyncUI();
    }
  }
}

async function removeRecord(id) {
  records = records.filter(r=>r.id!==id);
  saveLocal(); updateStats();
  if (fbConnected && window._fbDel) {
    updateSyncUI('syncing');
    try {
      await window._fbDel(id);
      updateSyncUI('synced');
    } catch(e) {
      showToast('雲端同步失敗','error');
      updateSyncUI();
    }
  }
}

async function persistMats() {
  saveLocal();
  if (fbConnected && window._fbSaveMats) {
    try { await window._fbSaveMats(materials); } catch(e) {}
  }
}

// ══════════════════════════════════════════
//  CALCULATIONS
// ══════════════════════════════════════════
function calcTons(area, th) {
  const t = parseFloat(th)||0;
  return +(area * DENSITY * (t/100)).toFixed(2);
}
function calcMill(area, th) {
  const t = parseFloat(th)||0;
  return +(area * DENSITY * (Math.max(0,t-0.5)/100)).toFixed(2);
}
function recTot(rec, what) {
  return rec.rows.reduce((s,r)=>{
    const a=+r.area||0, t=r.thickness||'0';
    if(what==='area') return s+a;
    if(what==='tons') return s+calcTons(a,t);
    if(what==='mill') return s+calcMill(a,t);
    return s;
  },0);
}
function n(v,d=2){return isNaN(v)||v===0?'0':v.toFixed(d);}

function parseDate(s){
  if(!s) return null;
  const roc=s.match(/^(\d{2,3})\/(\d{1,2})\/(\d{1,2})$/);
  if(roc) return new Date(+roc[1]+1911,+roc[2]-1,+roc[3]);
  const w=s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/);
  if(w) return new Date(+w[1],+w[2]-1,+w[3]);
  return null;
}
function weekday(s){const d=parseDate(s);return(d&&!isNaN(d))?WEEKDAYS[d.getDay()]:''; }

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function render(){
  const rl=document.getElementById('rl');
  if(!records.length){
    rl.innerHTML=`<div style="text-align:center;padding:36px 14px;color:var(--text-dim);font-size:13px">
      <div style="font-size:30px;margin-bottom:9px;opacity:.4">📋</div>尚無施工記錄</div>`;
    updateStats(); return;
  }
  renderFiltered();
  updateStats();
}

function matOpts(sel){
  return materials.map(m=>`<option value="${ea(m)}"${sel===m?' selected':''}>${eh(m)}</option>`).join('')+
    `<option value="" disabled>──────</option><option value="__manage__">⚙ 管理料別…</option>`;
}

      <div class="card-check" id="chk-${rec.id}" onclick="event.stopPropagation();toggleBatchSelect(${rec.id},this)"></div>

      </div>` : ''}
      <div class="icon-btn" onclick="toggle(${rec.id})">
        <svg id="ch-${rec.id}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:12px;height:12px;transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>

  <div class="card-summary" id="cs-${rec.id}" onclick="event.stopPropagation()">

      ${rec.milling&&rec.paving ? '<span style="color:var(--border);font-size:13px">·</span>' : ''}
      ${rec.paving  ? `<span style="font-size:13px;font-weight:600;color:var(--text-dim)">鋪設</span><span style="font-size:14px;font-weight:700;color:var(--text)">${eh(rec.paving)}</span>` : ''}
      ` : '<span style="font-size:13px;color:var(--text-dim)">未填時間</span>'}
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <div class="card-sum-item">
      <span class="card-sum-label">面積</span>

          <th style="width:26px"></th>

        <tbody id="tb-${rec.id}">${rec.rows.map((r,i)=>renderRow(rec,r,i)).join('')}</tbody>
        <tfoot>
          <tr class="total-row">
            <td colspan="2" style="text-align:right;padding-right:6px;font-size:10px;color:var(--text-dim)">小計</td>
            <td id="ta-${rec.id}">${n(ta,1)}</td>
            <td style="font-size:10px;color:var(--text-dim)">總噸數(T)</td>
            <td id="tt-${rec.id}">${n(tt)}</td>
            <td id="tm-${rec.id}">${n(tm)}</td>
            <td></td>
          </tr>
          <tr class="summary-row">
            <td colspan="2" style="color:var(--text-dim);font-size:10px">總面積(m²)</td>
            <td id="sa-${rec.id}" style="color:var(--accent2)">${n(ta,1)}</td>
            <td style="color:var(--text-dim);font-size:10px">總噸數(T)</td>
            <td id="st-${rec.id}" style="color:var(--accent2)">${n(tt)}</td>
            <td id="sm-${rec.id}" style="font-size:11px;color:var(--text-dim)">${n(tm)}</td>
            <td></td>
          </tr>
        </tfoot>
      </table></div>
      <button class="add-row-btn" onclick="addRow(${rec.id})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:13px;height:13px"><path d="M12 5v14M5 12h14"/></svg>新增路段
      </button>
    </div>
    <button class="btn btn-print" style="align-self:flex-end;margin-top:2px" onclick="openPreview(${rec.id})">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>列印預覽
    </button>
  </div>
</div>`;
}

function renderRow(rec,row,idx){
  const a=+row.area||0, t=row.thickness||'';
  const tons=a&&t?calcTons(a,t).toFixed(2):'';
  const mill=a&&t?calcMill(a,t).toFixed(2):'';
  return `<tr id="tr-${rec.id}-${row.id}">
    <td><div class="cr">${idx+1}</div></td>
    <td><input class="ci seg" value="${ea(row.segment||'')}" oninput="urf(${rec.id},${row.id},'segment',this.value)" placeholder="路段名稱"></td>
    <td><input class="ci" type="number" step="0.1" value="${a||''}" oninput="urA(${rec.id},${row.id},this)" placeholder="0"></td>
    <td><input class="ci" type="number" step="0.5" value="${ea(t)}" oninput="urT(${rec.id},${row.id},this.value)" placeholder="cm"></td>
    <td><div class="cr" id="tn-${rec.id}-${row.id}">${tons}</div></td>
    <td><div class="cr dim" id="mn-${rec.id}-${row.id}">${mill}</div></td>
    <td><button class="del-row-btn" onclick="delRow(${rec.id},${row.id})">×</button></td>
  </tr>`;
}

function toggle(id){
  const bd=document.getElementById(`bd-${id}`);
  const ch=document.getElementById(`ch-${id}`);
  const cd=document.getElementById(`card-${id}`);
  const o=bd.classList.toggle('open');
  cd.classList.toggle('active',o);
  if(ch) ch.style.transform=o?'rotate(180deg)':'';
}
function gr(id){return records.find(r=>r.id===id);}

// 日/夜切換
function uShift(id, val, btn) {
  const rec = gr(id); if (!rec) return;
  rec.shift = val; persistRecord(rec);
  // update header tag
  const tag = document.getElementById(`ts-${id}`);
  if (tag) tag.textContent = val;
  // update button states
  const panel = btn.closest('.shift-toggle');
  if (panel) {
    panel.querySelectorAll('.shift-btn').forEach(b => {
      b.className = 'shift-btn';
      if (b === btn) b.classList.add(val === '日間' ? 'active-day' : 'active-night');
    });
  }
}

// 更新派案地點或編號，重新組合顯示名稱
function uCaseField(id, field, val) {
  // 地點選單：若選到「新增地點」則開啟輸入
  if (field === 'caseLocation' && val === '__addloc__') {
    const newLoc = prompt('輸入新地點名稱：');
    if (newLoc && newLoc.trim()) {
      const loc = newLoc.trim();
      if (!locations.includes(loc)) {
        locations.push(loc);
        saveLocal();
      }
      // 設定為新地點並重新渲染該卡片選單
      const rec = gr(id); if (!rec) return;
      rec.caseLocation = loc;
      persistRecord(rec);
      // 重新渲染整張卡片以更新選單
      const cardEl = document.getElementById(`card-${id}`);
      const wasOpen = document.getElementById(`bd-${id}`)?.classList.contains('open');
      if (cardEl) { cardEl.outerHTML = renderCard(rec); }
      if (wasOpen) toggle(id);
    } else {
      // 取消：還原選單
      const rec = gr(id);
      const sel = document.getElementById(`cl-${id}`);
      if (sel && rec) sel.value = rec.caseLocation || locations[0] || '';
    }
    return;
  }
  const rec = gr(id); if (!rec) return;
  rec[field] = val;
  const badge = document.getElementById(`tcn-${id}`);
  if (badge) badge.textContent = buildCaseNumLabel(rec);
  // 同步更新地點 badge
  if (field === 'caseLocation') {
    const locBadge = document.getElementById(`tloc-${id}`);
    if (locBadge) locBadge.textContent = val;
  }
  persistRecord(rec);
}

function uf(id,field,val){
  const rec=gr(id);if(!rec)return;
  rec[field]=val; persistRecord(rec);
  if(field==='shift'){const e=document.getElementById(`ts-${id}`);if(e)e.textContent=val||'--';}
  if(field==='zone'){
    const e=document.getElementById(`tz-${id}`);if(e)e.textContent=val||'未命名工區';
    const l=document.getElementById(`tl-${id}`);if(l)l.textContent=`📊 施工路段明細 — ${val||''}`;
  }
}
function uDate(id,val){
  const rec=gr(id);if(!rec)return;
  rec.date=val; rec.weekday=weekday(val); persistRecord(rec);
  document.getElementById(`td-${id}`).textContent=val||'--';
  document.getElementById(`tw-${id}`).textContent=rec.weekday;
  document.getElementById(`wi-${id}`).value=rec.weekday;
}
function uMat(id,sel){
  if(sel.value==='__manage__'){openMatMo();const r=gr(id);if(r)sel.value=r.material;return;}
  uf(id,'material',sel.value);
}
function urf(rId,rId2,f,v){const rec=gr(rId);if(!rec)return;const row=rec.rows.find(r=>r.id===rId2);if(row){row[f]=v;persistRecord(rec);}}
function urA(rId,rId2,inp){
  const rec=gr(rId);if(!rec)return;const row=rec.rows.find(r=>r.id===rId2);if(!row)return;
  row.area=parseFloat(inp.value)||0; refreshRow(rId,rId2,row); updTots(rId); persistRecord(rec);
}
function urT(rId,rId2,v){
  const rec=gr(rId);if(!rec)return;const row=rec.rows.find(r=>r.id===rId2);if(!row)return;
  row.thickness=v; refreshRow(rId,rId2,row); updTots(rId); persistRecord(rec);
}
function refreshRow(rId,rId2,row){
  const a=+row.area||0,t=row.thickness||'';
  const te=document.getElementById(`tn-${rId}-${rId2}`);
  const me=document.getElementById(`mn-${rId}-${rId2}`);
  if(te)te.textContent=a&&t?calcTons(a,t).toFixed(2):'';
  if(me)me.textContent=a&&t?calcMill(a,t).toFixed(2):'';
}
function updTots(rId){
  const rec=gr(rId);if(!rec)return;
  const ta=recTot(rec,'area'),tt=recTot(rec,'tons'),tm=recTot(rec,'mill');
  const g=id=>document.getElementById(id);
  if(g(`ta-${rId}`))g(`ta-${rId}`).textContent=n(ta,1);
  if(g(`tt-${rId}`))g(`tt-${rId}`).textContent=n(tt);
  if(g(`tm-${rId}`))g(`tm-${rId}`).textContent=n(tm);
  if(g(`sa-${rId}`))g(`sa-${rId}`).textContent=n(ta,1);
  if(g(`st-${rId}`))g(`st-${rId}`).textContent=n(tt);
  if(g(`sm-${rId}`))g(`sm-${rId}`).textContent=n(tm);
  // update collapsed summary bar
  if(g(`cs-a-${rId}`))g(`cs-a-${rId}`).textContent=n(ta,1);
  if(g(`cs-t-${rId}`))g(`cs-t-${rId}`).textContent=n(tt);
  if(g(`cs-m-${rId}`))g(`cs-m-${rId}`).textContent=n(tm);
}

function addRow(rId){
  const rec=gr(rId);if(!rec)return;
  const nid=Date.now();
  rec.rows.push({id:nid,segment:'',area:0,thickness:''});
  const tb=document.getElementById(`tb-${rId}`);
  if(tb){
    const tr=document.createElement('tr');tr.id=`tr-${rId}-${nid}`;
    tr.innerHTML=renderRow(rec,rec.rows[rec.rows.length-1],rec.rows.length-1).replace(/^<tr[^>]*>|<\/tr>$/g,'');
    tb.appendChild(tr); reindex(rId);
  }
  updTots(rId); persistRecord(rec);
}
function delRow(rId,rId2){
  const rec=gr(rId);if(!rec)return;
  rec.rows=rec.rows.filter(r=>r.id!==rId2);
  const el=document.getElementById(`tr-${rId}-${rId2}`);if(el)el.remove();
  reindex(rId); updTots(rId); persistRecord(rec);
}
function reindex(rId){
  const tb=document.getElementById(`tb-${rId}`);if(!tb)return;
  tb.querySelectorAll('tr').forEach((tr,i)=>{const c=tr.querySelector('.cr');if(c)c.textContent=i+1;});
}

function addRecord(){
  const d=new Date(),nid=Date.now();
  const rec={id:nid,
    caseLocation: locations[0]||'板橋',
    caseNum: '',
    date:`${d.getFullYear()-1911}/${d.getMonth()+1}/${d.getDate()}`,
    weekday:WEEKDAYS[d.getDay()],shift:'夜間',milling:'',paving:'',zone:'',material:materials[0]||'',

  showToast('已新增施工記錄','success');
}

function closeDelMo(){document.getElementById('delMo').classList.remove('open');delTarget=null;}
async function confirmDel(){

}

let searchQ = '';
let activeFilter = 'all';

function doSearch() {
  searchQ = document.getElementById('searchInp').value.replace(/\s+/g,' ').trim().toLowerCase();
  renderFiltered();
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderFiltered();
}

function getFiltered() {
  return records.filter(rec => {
    // shift filter
    if (activeFilter === 'day'   && rec.shift !== '日間') return false;
    if (activeFilter === 'night' && rec.shift !== '夜間') return false;
    // search
    if (!searchQ) return true;
    const hay = [
      buildCaseNo(rec) || '',
      rec.zone || '',
      rec.date || '',
      rec.material || '',
      rec.caseLocation || '',
      rec.caseNum || '',
      buildCaseNumLabel(rec) || '',
      ...( rec.rows||[] ).map(r=>r.segment||'')
    ].join('　').replace(/\s+/g,' ').trim().toLowerCase();
    // split searchQ into words, all must match
    return searchQ.split(' ').filter(Boolean).every(w => hay.includes(w));
  });
}

function renderFiltered() {
  const rl = document.getElementById('rl');
  const filtered = getSorted(getFiltered());
  if (!filtered.length) {
    rl.innerHTML = `<div style="text-align:center;padding:30px 14px;color:var(--text-dim);font-size:14px">
      <div style="font-size:28px;margin-bottom:8px">🔍</div>找不到符合的記錄</div>`;
    return;
  }
  rl.innerHTML = filtered.map(r => renderCard(r)).join('');
}

function openStatsModal() {
  const grid = document.getElementById('statsGrid');

    grid.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:10px">尚無記錄</div>';
    document.getElementById('statsMo').classList.add('open');
    return;
  }

  // Group by caseNo
  const map = {};
  records.forEach(rec => {
    const key = buildCaseNo(rec);
    if (!map[key]) map[key] = { name: key, area: 0, tons: 0, count: 0 };
    map[key].area  += recTot(rec, 'area');
    map[key].tons  += recTot(rec, 'tons');
    map[key].count += 1;
  });

  const list = Object.values(map).sort((a,b) => b.area - a.area);
  const totArea = list.reduce((s,r) => s+r.area, 0);
  const totTons = list.reduce((s,r) => s+r.tons, 0);

  grid.innerHTML = list.map(r => `
    <div class="stats-row">
      <div>
        <div class="stats-row-name">${eh(r.name)}</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:2px">${r.count} 筆記錄</div>

      <div class="stats-row-area">${r.area.toFixed(1)} m²</div>
      <div class="stats-row-tons">${r.tons.toFixed(2)} T</div>
    </div>`).join('') + `
    <div class="stats-total">
      <div style="font-size:14px;font-weight:800;color:var(--accent)">合計</div>
      <div class="stats-row-area" style="font-size:15px">${totArea.toFixed(1)} m²</div>
      <div class="stats-row-tons" style="font-size:15px">${totTons.toFixed(2)} T</div>
    </div>`;

  document.getElementById('statsMo').classList.add('open');
}

// ══════════════════════════════════════════
//  SORT
// ══════════════════════════════════════════
let currentSort = 'date-desc';

function setSort(s, el) {
  currentSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderFiltered();
}

function getSorted(arr) {
  return [...arr].sort((a, b) => {
    if (currentSort === 'date-desc' || currentSort === 'date-asc') {
      const da = parseDate(a.date), db = parseDate(b.date);
      const ta = da ? da.getTime() : 0, tb = db ? db.getTime() : 0;
      return currentSort === 'date-desc' ? tb - ta : ta - tb;
    }
    if (currentSort === 'area-desc' || currentSort === 'area-asc') {
      const aa = recTot(a,'area'), ab = recTot(b,'area');
      return currentSort === 'area-desc' ? ab - aa : aa - ab;
    }
    return 0;
  });
}

//  COPY RECORD
// ══════════════════════════════════════════
function copyRecord(id) {
  const src = gr(id); if (!src) return;
  const nid = Date.now();
  const d = new Date();
  const copy = JSON.parse(JSON.stringify(src));
  copy.id   = nid;
  copy.date = `${d.getFullYear()-1911}/${d.getMonth()+1}/${d.getDate()}`;
  copy.weekday = WEEKDAYS[d.getDay()];
  copy.locked = false;
  copy.rows = copy.rows.map(r => ({ ...r, id: Date.now() + Math.random()*1000|0 }));
  records.push(copy);
  persistRecord(copy);
  render();
  setTimeout(() => {
    toggle(nid);
    const el = document.getElementById(`card-${nid}`);
    if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
  }, 80);
  showToast('已複製派案 ✓', 'success');
}

//  LOCK / UNLOCK
// ══════════════════════════════════════════
function toggleLock(id) {
  const rec = gr(id); if (!rec) return;
  rec.locked = !rec.locked;
  persistRecord(rec);
  render();
  showToast(rec.locked ? '✅ 已標記為完工' : '🔓 已取消完工', 'success');
}

// ══════════════════════════════════════════
//  LONG PRESS CONTEXT MENU
// ══════════════════════════════════════════
let _lpTimer = null;
let _ctxId   = null;

function startLongPress(e, id) {
  cancelLongPress();
  _lpTimer = setTimeout(() => {
    openCtx(e, id);
  }, 550);
}
function cancelLongPress() {
  clearTimeout(_lpTimer);
  _lpTimer = null;
}

function openCtx(e, id) {
  cancelLongPress();
  _ctxId = id;
  const rec = gr(id);
  const menu = document.getElementById('ctxMenu');
  const overlay = document.getElementById('ctxOverlay');
  // update lock label
  const lockLabel = document.getElementById('ctxLockLabel');
  if (lockLabel) lockLabel.textContent = rec && rec.locked ? '取消完工' : '標記完工';
  // position
  const x = e.clientX || (e.touches && e.touches[0].clientX) || window.innerWidth/2;
  const y = e.clientY || (e.touches && e.touches[0].clientY) || window.innerHeight/2;
  menu.style.left = Math.min(x, window.innerWidth - 200) + 'px';
  menu.style.top  = Math.min(y, window.innerHeight - 180) + 'px';
  menu.classList.add('show');
  overlay.classList.add('show');
  if (navigator.vibrate) navigator.vibrate(30);
}
function closeCtx() {
  document.getElementById('ctxMenu').classList.remove('show');
  document.getElementById('ctxOverlay').classList.remove('show');
  _ctxId = null;
}
function ctxAction(action) {
  const id = _ctxId;
  closeCtx();
  if (!id) return;
  if (action === 'copy')    copyRecord(id);
  if (action === 'lock')    toggleLock(id);
  if (action === 'preview') openPreview(id);
  if (action === 'delete')  askDel(id);
}

      <div style="padding:9px 12px;border-right:${i%3===2?'none':'1px solid #cbd5e1'};border-bottom:${i>=3?'none':'1px solid #cbd5e1'}">

let batchMode    = false;
let batchSelected = new Set();

function enterBatchMode() {
  batchMode = true;
  batchSelected.clear();
  document.getElementById('batchBar').classList.add('show');
  document.getElementById('batchCount').textContent = '已選 0 筆';
  // show all checkboxes
  document.querySelectorAll('.card-check').forEach(el => el.classList.add('show'));
  // disable card toggle when in batch mode — handled in toggleBatchSelect
  showToast('點選卡片勾選，再按列印', '');
}

function exitBatchMode() {
  batchMode = false;
  batchSelected.clear();
  document.getElementById('batchBar').classList.remove('show');
  document.querySelectorAll('.card-check').forEach(el => {
    el.classList.remove('show','checked');
  });
}

function toggleBatchSelect(id, el) {
  if (!batchMode) return;
  if (batchSelected.has(id)) {
    batchSelected.delete(id);
    el.classList.remove('checked');
  } else {
    batchSelected.add(id);
    el.classList.add('checked');
  }
  document.getElementById('batchCount').textContent = `已選 ${batchSelected.size} 筆`;
}

function selectAllBatch() {
  const filtered = getSorted(getFiltered());
  filtered.forEach(rec => {
    batchSelected.add(rec.id);
    const el = document.getElementById(`chk-${rec.id}`);
    if (el) el.classList.add('checked');
  });
  document.getElementById('batchCount').textContent = `已選 ${batchSelected.size} 筆`;
}

function today(){const d=new Date();return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;}
function eh(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ea(s){return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

let toastT;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=`toast show ${type}`;
  clearTimeout(toastT);toastT=setTimeout(()=>t.className='toast',2500);
}

['matMo','delMo','statsMo'].forEach(id=>{

    if(e.target===this){if(this.id==='matMo')closeMatMo();else if(this.id==='delMo')closeDelMo();else closeStatsMo();}
